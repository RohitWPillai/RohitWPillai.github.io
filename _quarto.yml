project:
  type: website
  resources:
    - assets/press/*
    - images/team/*
  render:
    - "*.qmd"
    - "posts/**/*.qmd"

execute:
  freeze: auto

website:
  title: "Rohit Pillai"
  description: "Senior Lecturer in Mechanical Engineering, University of Edinburgh. Research in molecular dynamics, nanoscale heat transfer, and computational engineering."
  site-url: https://rohitwpillai.github.io
  favicon: images/favicon.png
  open-graph: true
  twitter-card: true
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: cv.qmd
        text: CV
      - href: team.qmd
        text: Team
      - href: projects.qmd
        text: Research
      - href: publications.qmd
        text: Publications
  page-footer:
    center: "Rohit Pillai · University of Edinburgh"

format:
  html:
    theme:
      - cosmo
      - assets/theme-dark.scss
    css: styles.css
    toc: true
    page-layout: full
    mainfont: Inter
    include-in-header:
      - text: |
          <a class="visually-hidden-focusable" href="#quarto-content">Skip to content</a>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    include-after-body:
      - assets/ambient-dust.html
      - assets/scroll-reveal.html
      - assets/team-network.html
      - assets/research-diagram.html
      - assets/career-timeline.html
      - assets/grants-gantt.html
      - assets/service-timeline.html
      - assets/talks-map.html
      - assets/methods-pipeline.html
