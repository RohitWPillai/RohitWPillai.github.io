<script>
(function() {
  'use strict';

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('career-timeline');
    if (!container) return;

    // ===== Configuration =====
    var W = 800, H = 480;
    var YEAR_R = 15;
    var TRANS_R = 10;
    var MILESTONE_R = 8;
    var BROWNIAN = 0.10, SPRING_K = 0.015, DAMPING = 0.88;
    var ROW1_Y = 130, ROW2_Y = 350;
    var X_PAD = 80;
    var COLS = 5;
    var COL_W = (W - 2 * X_PAD) / (COLS - 1);
    var BRANCH_LEN = 60;

    var COLORS = {
      slate:   { light: '#a0b0c8', base: '#7888a8', dark: '#4a5870' },
      lilac:   { light: '#b8b0c0', base: '#9088a0', dark: '#585068' },
      rose:    { light: '#d098a8', base: '#a87080', dark: '#684050' },
      copper:  { light: '#e8a080', base: '#c07050', dark: '#784030' },
      neutral: { light: '#8a8a9a', base: '#5a5a6e', dark: '#3a3a4e' }
    };

    // ===== Year spine =====
    // Colors: slate=PhD, lilac=Postdoc, rose=Lecturer, copper=Senior Lecturer
    var yearData = [
      { year: 2017, color: 'slate', role: 'PHD \u00b7 MELBOURNE', row: 0, col: 0,
        tip: 'PhD in Chemical & Biomolecular Engineering, University of Melbourne. Completed December 2017.' },
      { year: 2018, color: 'lilac', role: 'POSTDOC \u00b7 EDINBURGH', row: 0, col: 1,
        tip: 'Postdoctoral Research Associate, University of Edinburgh (January\u2013August 2018).' },
      { year: 2019, color: 'rose', row: 0, col: 2,
        tip: 'Lecturer in Mechanical Engineering, University of Edinburgh. First full year as independent PI.' },
      { year: 2020, color: 'rose', row: 0, col: 3,
        tip: 'Lecturer in Mechanical Engineering, University of Edinburgh.' },
      { year: 2021, color: 'rose', row: 0, col: 4,
        tip: 'Lecturer in Mechanical Engineering, University of Edinburgh.' },
      { year: 2022, color: 'rose', row: 1, col: 4,
        tip: 'Lecturer in Mechanical Engineering, University of Edinburgh.' },
      { year: 2023, color: 'rose', row: 1, col: 3,
        tip: 'Lecturer then Senior Lecturer, University of Edinburgh. Promoted 1 August 2023.' },
      { year: 2024, color: 'copper', row: 1, col: 2,
        tip: 'Senior Lecturer in Mechanical Engineering. ERC Starting Grant awarded August 2024.' },
      { year: 2025, color: 'copper', row: 1, col: 1,
        tip: 'Senior Lecturer in Mechanical Engineering, University of Edinburgh.' },
      { year: 2026, color: 'copper', row: 1, col: 0,
        tip: 'Senior Lecturer in Mechanical Engineering, University of Edinburgh.' }
    ];

    // ===== Transitions on the spine =====
    var transitions = [
      { fromYear: 2018, toYear: 2019, frac: 0.75, fromColor: 'lilac', toColor: 'rose',
        label: 'LECTURER', labelSide: 1,
        tip: 'Appointed Lecturer (Assistant Professor) in Mechanical Engineering, University of Edinburgh, September 2018.' },
      { fromYear: 2023, toYear: 2024, frac: 0.67, fromColor: 'rose', toColor: 'copper',
        label: 'SENIOR LECTURER', labelSide: 1,
        tip: 'Promoted to Senior Lecturer (Associate Professor) in Mechanical Engineering, University of Edinburgh, 1 August 2023.' }
    ];

    // ===== Milestones =====
    // yearFrac = year + month/12 (Jan=1/12, Sep=9/12, etc.)
    // Positioned at exact fractional spine position; branch above (side=1) or below (side=-1)
    var milestones = [
      { yearFrac: 2018.75, side: 1,  label: 'First PhD student',
        tip: 'Began supervising first PhD student (Sritay Mistry) at Edinburgh, September 2018.' },
      { yearFrac: 2018.75, side: -1, label: 'BBC Scotland \u00b7 national press', url: 'https://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-45471403',
        tip: 'Acoustothermal atomization paper covered by BBC Scotland, The Times, Daily Express, Metro, The Sun, September 2018.' },
      { yearFrac: 2019.08, side: 1,  label: 'EPSRC eCSE (\u00a3100K)', extraLen: 30,
        tip: 'First PI grant: EPSRC Embedded CSE programme for efficient multi-scale simulations, January 2019.' },
      { yearFrac: 2021.08, side: 1,  label: 'Leverhulme Fellows \u00d72',
        tip: 'Both supervised postdocs (Datta, Perumanath) awarded Leverhulme Trust Early Career Fellowships, January 2021.' },
      { yearFrac: 2021.17, side: -1, label: 'Nanobubble press', url: 'https://www.eurekalert.org/news-releases/691043',
        tip: 'Acoustothermal nanobubble nucleation paper covered by EurekAlert, ScienceDaily, Phys.org, February 2021.' },
      { yearFrac: 2022.75, side: 1,  label: 'PDRA Champion',
        tip: 'Appointed PDRA Champion for the School of Engineering, advocate for postdoc welfare and career development, September 2022.' },
      { yearFrac: 2023.58, side: 1,  label: 'Cicada press', url: 'https://theconversation.com/cicadas-could-hold-the-secret-to-self-cleaning-surfaces-new-study-207435',
        tip: 'Self-cleaning cicada wing paper covered by The Conversation, Phys.org, TechXplore, July 2023.' },
      { yearFrac: 2024.08, side: -1, label: 'ERC Evaluator \u00b7 EPSRC College',
        tip: 'Appointed ERC Expert Evaluator and EPSRC Peer Review College member, January 2024.' },
      { yearFrac: 2024.67, side: 1,  label: 'ERC Starting Grant (\u00a31.27M)',
        tip: 'Awarded ERC Starting Grant NANO-COOL (2024\u20132029, \u00a31,270,000) for nanoscale cooling research, August 2024.' },
      { yearFrac: 2026, side: 1,  label: 'NEMD Conference Chair', extraLen: 30,
        tip: 'Chair of 5th NEMD Conference, Edinburgh, July 2026.' }
    ];

    // ===== Compute year positions =====
    yearData.forEach(function(d) {
      d.ex = X_PAD + d.col * COL_W;
      d.ey = d.row === 0 ? ROW1_Y : ROW2_Y;
      d.px = d.ex; d.py = d.ey;
      d.vx = 0; d.vy = 0;
    });

    var yearMap = {};
    yearData.forEach(function(d) { yearMap[d.year] = d; });

    // Interpolate a position on the spine from current year node positions
    function spinePos(yearFrac) {
      var yr = Math.floor(yearFrac);
      var frac = yearFrac - yr;
      var from = yearMap[yr];
      var to = yearMap[yr + 1];
      if (!from) return to || { px: X_PAD, py: ROW1_Y };
      if (!to || frac < 0.01) return { px: from.px, py: from.py };
      return {
        px: from.px + frac * (to.px - from.px),
        py: from.py + frac * (to.py - from.py)
      };
    }

    // Compute transition positions
    transitions.forEach(function(t) {
      var from = yearMap[t.fromYear], to = yearMap[t.toYear];
      t.fromNode = from; t.toNode = to;
      t.ex = from.ex + t.frac * (to.ex - from.ex);
      t.ey = from.ey + t.frac * (to.ey - from.ey);
      t.mx = t.ex; t.my = t.ey;
    });

    // Compute milestone equilibrium positions
    // Group milestones by (approximate yearFrac, side) for stacking
    var msGroups = {};
    milestones.forEach(function(m) {
      var key = Math.round(m.yearFrac * 4) + '_' + m.side; // quarter-year buckets
      if (!msGroups[key]) msGroups[key] = [];
      msGroups[key].push(m);
    });

    milestones.forEach(function(m) {
      var key = Math.round(m.yearFrac * 4) + '_' + m.side;
      var group = msGroups[key];
      var idx = group.indexOf(m);
      var sp = spinePos(m.yearFrac);
      m.spineEx = sp.px; m.spineEy = sp.py;
      var extra = m.extraLen || 0;
      m.ex = sp.px;
      m.ey = sp.py + m.side * -(BRANCH_LEN + extra + idx * 30);
      m.px = m.ex; m.py = m.ey;
      m.vx = 0; m.vy = 0;
    });

    // ===== SVG =====
    var NS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.width = '100%';
    svg.style.height = 'auto';
    svg.style.display = 'block';
    svg.setAttribute('aria-label', 'Interactive career timeline from 2017 PhD to present, with milestones');

    var defs = document.createElementNS(NS, 'defs');
    Object.keys(COLORS).forEach(function(key) {
      var c = COLORS[key];
      var g = document.createElementNS(NS, 'radialGradient');
      g.id = 'cv-sphere-' + key;
      g.setAttribute('cx', '0.35'); g.setAttribute('cy', '0.35'); g.setAttribute('r', '0.65');
      [{ o: '0%', c: c.light }, { o: '45%', c: c.base }, { o: '100%', c: c.dark }].forEach(function(s) {
        var st = document.createElementNS(NS, 'stop');
        st.setAttribute('offset', s.o); st.setAttribute('stop-color', s.c);
        g.appendChild(st);
      });
      defs.appendChild(g);
    });
    var hl = document.createElementNS(NS, 'radialGradient');
    hl.id = 'cv-specular';
    hl.setAttribute('cx', '0.30'); hl.setAttribute('cy', '0.30'); hl.setAttribute('r', '0.40');
    [{ o: '0%', a: '0.55' }, { o: '30%', a: '0.18' }, { o: '100%', a: '0' }].forEach(function(s) {
      var st = document.createElementNS(NS, 'stop');
      st.setAttribute('offset', s.o); st.setAttribute('stop-color', 'white'); st.setAttribute('stop-opacity', s.a);
      hl.appendChild(st);
    });
    defs.appendChild(hl);
    svg.appendChild(defs);

    // Tooltip
    var tooltip = document.getElementById('career-tooltip');
    var ttTitle = tooltip.querySelector('.ct-title');
    var ttDesc = tooltip.querySelector('.ct-desc');

    function showTip(title, desc) { ttTitle.textContent = title; ttDesc.textContent = desc; tooltip.classList.add('visible'); }
    function moveTip(e) {
      var cr = container.getBoundingClientRect();
      tooltip.style.left = Math.min(e.clientX - cr.left + 12, cr.width - 260) + 'px';
      tooltip.style.top = (e.clientY - cr.top - 55) + 'px';
    }
    function hideTip() { tooltip.classList.remove('visible'); }

    var bondGroup = document.createElementNS(NS, 'g');
    svg.appendChild(bondGroup);
    var nodeGroup = document.createElementNS(NS, 'g');
    svg.appendChild(nodeGroup);

    // ===== Spine bonds (split at transitions) =====
    var spineBonds = [];
    var foldIdx = 4;

    function findTransition(fromYear, toYear) {
      for (var i = 0; i < transitions.length; i++) {
        if (transitions[i].fromYear === fromYear && transitions[i].toYear === toYear) return transitions[i];
      }
      return null;
    }

    for (var i = 0; i < yearData.length - 1; i++) {
      var trans = findTransition(yearData[i].year, yearData[i + 1].year);

      if (i === foldIdx) {
        var curve = document.createElementNS(NS, 'path');
        curve.setAttribute('stroke', COLORS[yearData[i].color].base);
        curve.setAttribute('stroke-width', '2.5');
        curve.setAttribute('stroke-opacity', '0.35');
        curve.setAttribute('fill', 'none');
        bondGroup.appendChild(curve);
        spineBonds.push({ el: curve, from: yearData[i], to: yearData[i + 1], isCurve: true });
      } else if (trans) {
        var line1 = document.createElementNS(NS, 'line');
        line1.setAttribute('stroke', COLORS[trans.fromColor].base);
        line1.setAttribute('stroke-width', '2.5');
        line1.setAttribute('stroke-opacity', '0.35');
        bondGroup.appendChild(line1);
        spineBonds.push({ el: line1, from: yearData[i], toTrans: trans, isSplitA: true });

        var line2 = document.createElementNS(NS, 'line');
        line2.setAttribute('stroke', COLORS[trans.toColor].base);
        line2.setAttribute('stroke-width', '2.5');
        line2.setAttribute('stroke-opacity', '0.35');
        bondGroup.appendChild(line2);
        spineBonds.push({ el: line2, fromTrans: trans, to: yearData[i + 1], isSplitB: true });
      } else {
        var line = document.createElementNS(NS, 'line');
        line.setAttribute('stroke', COLORS[yearData[i].color].base);
        line.setAttribute('stroke-width', '2.5');
        line.setAttribute('stroke-opacity', '0.35');
        bondGroup.appendChild(line);
        spineBonds.push({ el: line, from: yearData[i], to: yearData[i + 1] });
      }
    }

    // Milestone branch bonds (from spine anchor to milestone)
    var branchBonds = [];
    milestones.forEach(function(m) {
      var line = document.createElementNS(NS, 'line');
      line.setAttribute('stroke', COLORS.neutral.base);
      line.setAttribute('stroke-width', '1');
      line.setAttribute('stroke-opacity', '0.25');
      bondGroup.appendChild(line);
      branchBonds.push({ el: line, milestone: m });
    });

    // ===== Year nodes =====
    yearData.forEach(function(d) {
      var g = document.createElementNS(NS, 'g');
      g.style.cursor = 'pointer';
      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('r', YEAR_R);
      circ.setAttribute('fill', 'url(#cv-sphere-' + d.color + ')');
      g.appendChild(circ);
      var spec = document.createElementNS(NS, 'circle');
      spec.setAttribute('r', YEAR_R);
      spec.setAttribute('fill', 'url(#cv-specular)');
      g.appendChild(spec);

      var yearText = document.createElementNS(NS, 'text');
      yearText.setAttribute('x', '0');
      yearText.setAttribute('y', YEAR_R + 18);
      yearText.setAttribute('text-anchor', 'middle');
      yearText.setAttribute('fill', COLORS[d.color].base);
      yearText.setAttribute('font-family', '"Fraunces", serif');
      yearText.setAttribute('font-size', '14');
      yearText.textContent = d.year;
      g.appendChild(yearText);

      if (d.role) {
        var roleText = document.createElementNS(NS, 'text');
        roleText.setAttribute('x', '0');
        roleText.setAttribute('y', YEAR_R + 32);
        roleText.setAttribute('text-anchor', 'middle');
        roleText.setAttribute('fill', '#9898b0');
        roleText.setAttribute('font-family', 'Inter, sans-serif');
        roleText.setAttribute('font-size', '9');
        roleText.setAttribute('font-weight', '600');
        roleText.setAttribute('letter-spacing', '0.08em');
        roleText.textContent = d.role;
        g.appendChild(roleText);
      }

      (function(d, g) {
        g.addEventListener('mouseenter', function() { showTip(d.year + (d.role ? ', ' + d.role : ''), d.tip); });
        g.addEventListener('mousemove', moveTip);
        g.addEventListener('mouseleave', hideTip);
        // Keyboard accessibility
        g.setAttribute('tabindex', '0');
        g.setAttribute('role', 'img');
        g.setAttribute('aria-label', d.year + (d.role ? ', ' + d.role : '') + '. ' + d.tip);
        g.addEventListener('focus', function() {
          showTip(d.year + (d.role ? ', ' + d.role : ''), d.tip);
          var cr = container.getBoundingClientRect();
          var r = g.getBoundingClientRect();
          tooltip.style.left = Math.min(r.left - cr.left + r.width / 2, cr.width - 260) + 'px';
          tooltip.style.top = (r.top - cr.top - 55) + 'px';
        });
        g.addEventListener('blur', hideTip);
      })(d, g);

      d.el = g;
      nodeGroup.appendChild(g);
    });

    // ===== Transition markers =====
    transitions.forEach(function(t) {
      var g = document.createElementNS(NS, 'g');
      g.style.cursor = 'pointer';
      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('r', TRANS_R);
      circ.setAttribute('fill', 'url(#cv-sphere-' + t.toColor + ')');
      g.appendChild(circ);
      var spec = document.createElementNS(NS, 'circle');
      spec.setAttribute('r', TRANS_R);
      spec.setAttribute('fill', 'url(#cv-specular)');
      g.appendChild(spec);

      var labelY = t.labelSide > 0 ? -(TRANS_R + 8) : (TRANS_R + 14);
      var labelText = document.createElementNS(NS, 'text');
      labelText.setAttribute('x', '0');
      labelText.setAttribute('y', labelY);
      labelText.setAttribute('text-anchor', 'middle');
      labelText.setAttribute('fill', COLORS[t.toColor].base);
      labelText.setAttribute('font-family', 'Inter, sans-serif');
      labelText.setAttribute('font-size', '9');
      labelText.setAttribute('font-weight', '600');
      labelText.setAttribute('letter-spacing', '0.08em');
      labelText.textContent = t.label;
      g.appendChild(labelText);

      (function(t, g) {
        g.addEventListener('mouseenter', function() { showTip(t.label, t.tip); });
        g.addEventListener('mousemove', moveTip);
        g.addEventListener('mouseleave', hideTip);
        // Keyboard accessibility
        g.setAttribute('tabindex', '0');
        g.setAttribute('role', 'img');
        g.setAttribute('aria-label', t.label + '. ' + t.tip);
        g.addEventListener('focus', function() {
          showTip(t.label, t.tip);
          var cr = container.getBoundingClientRect();
          var r = g.getBoundingClientRect();
          tooltip.style.left = Math.min(r.left - cr.left + r.width / 2, cr.width - 260) + 'px';
          tooltip.style.top = (r.top - cr.top - 55) + 'px';
        });
        g.addEventListener('blur', hideTip);
      })(t, g);

      t.markerEl = g;
      nodeGroup.appendChild(g);
    });

    // ===== Milestone nodes =====
    milestones.forEach(function(m) {
      var g = document.createElementNS(NS, 'g');
      g.style.cursor = m.url ? 'pointer' : 'default';
      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('r', MILESTONE_R);
      circ.setAttribute('fill', 'url(#cv-sphere-neutral)');
      g.appendChild(circ);
      var spec = document.createElementNS(NS, 'circle');
      spec.setAttribute('r', MILESTONE_R);
      spec.setAttribute('fill', 'url(#cv-specular)');
      g.appendChild(spec);

      var labelY = m.side > 0 ? -(MILESTONE_R + 7) : (MILESTONE_R + 13);
      var labelText = document.createElementNS(NS, 'text');
      labelText.setAttribute('x', '0');
      labelText.setAttribute('y', labelY);
      // Edge-aware text anchor: right-align near right edge, left-align near left edge
      var anchor = 'middle';
      if (m.ex > W - 120) anchor = 'end';
      else if (m.ex < 120) anchor = 'start';
      labelText.setAttribute('text-anchor', anchor);
      labelText.setAttribute('fill', m.url ? '#c07050' : '#c0c0c8');
      labelText.setAttribute('font-family', 'Inter, sans-serif');
      labelText.setAttribute('font-size', '11');
      labelText.textContent = m.label;
      g.appendChild(labelText);

      if (m.url) {
        g.addEventListener('click', function() { window.open(m.url, '_blank', 'noopener'); });
      }
      if (m.tip) {
        (function(m, g) {
          g.addEventListener('mouseenter', function() { showTip(m.label, m.tip); });
          g.addEventListener('mousemove', moveTip);
          g.addEventListener('mouseleave', hideTip);
        })(m, g);
      }

      // Keyboard accessibility
      (function(m, g) {
        g.setAttribute('tabindex', '0');
        g.setAttribute('role', m.url ? 'link' : 'img');
        g.setAttribute('aria-label', m.label + (m.tip ? '. ' + m.tip : ''));
        g.addEventListener('focus', function() {
          if (m.tip) {
            showTip(m.label, m.tip);
            var cr = container.getBoundingClientRect();
            var r = g.getBoundingClientRect();
            tooltip.style.left = Math.min(r.left - cr.left + r.width / 2, cr.width - 260) + 'px';
            tooltip.style.top = (r.top - cr.top - 55) + 'px';
          }
        });
        g.addEventListener('blur', hideTip);
        g.addEventListener('keydown', function(e) {
          if ((e.key === 'Enter' || e.key === ' ') && m.url) { e.preventDefault(); window.open(m.url, '_blank', 'noopener'); }
        });
      })(m, g);

      m.el = g;
      nodeGroup.appendChild(g);
    });

    container.appendChild(svg);

    // ===== Physics =====
    var running = true;
    var physNodes = yearData.concat(milestones);

    function physics() {
      physNodes.forEach(function(n) {
        n.vx += -SPRING_K * (n.px - n.ex);
        n.vy += -SPRING_K * (n.py - n.ey);
        n.vx += (Math.random() - 0.5) * BROWNIAN;
        n.vy += (Math.random() - 0.5) * BROWNIAN;
        n.vx *= DAMPING;
        n.vy *= DAMPING;
        n.px += n.vx;
        n.py += n.vy;
      });
    }

    function render() {
      // Year nodes
      yearData.forEach(function(n) {
        n.el.setAttribute('transform', 'translate(' + n.px.toFixed(1) + ',' + n.py.toFixed(1) + ')');
      });

      // Milestone nodes
      milestones.forEach(function(n) {
        n.el.setAttribute('transform', 'translate(' + n.px.toFixed(1) + ',' + n.py.toFixed(1) + ')');
      });

      // Transition markers (interpolated on spine)
      transitions.forEach(function(t) {
        var mx = t.fromNode.px + t.frac * (t.toNode.px - t.fromNode.px);
        var my = t.fromNode.py + t.frac * (t.toNode.py - t.fromNode.py);
        t.mx = mx; t.my = my;
        t.markerEl.setAttribute('transform', 'translate(' + mx.toFixed(1) + ',' + my.toFixed(1) + ')');
      });

      // Spine bonds
      spineBonds.forEach(function(b) {
        if (b.isCurve) {
          var cx = Math.max(b.from.px, b.to.px) + 40;
          var cy = (b.from.py + b.to.py) / 2;
          b.el.setAttribute('d', 'M ' + b.from.px.toFixed(1) + ' ' + b.from.py.toFixed(1) +
            ' Q ' + cx.toFixed(1) + ' ' + b.from.py.toFixed(1) +
            ' ' + cx.toFixed(1) + ' ' + cy.toFixed(1) +
            ' Q ' + cx.toFixed(1) + ' ' + b.to.py.toFixed(1) +
            ' ' + b.to.px.toFixed(1) + ' ' + b.to.py.toFixed(1));
        } else if (b.isSplitA) {
          b.el.setAttribute('x1', b.from.px.toFixed(1)); b.el.setAttribute('y1', b.from.py.toFixed(1));
          b.el.setAttribute('x2', b.toTrans.mx.toFixed(1)); b.el.setAttribute('y2', b.toTrans.my.toFixed(1));
        } else if (b.isSplitB) {
          b.el.setAttribute('x1', b.fromTrans.mx.toFixed(1)); b.el.setAttribute('y1', b.fromTrans.my.toFixed(1));
          b.el.setAttribute('x2', b.to.px.toFixed(1)); b.el.setAttribute('y2', b.to.py.toFixed(1));
        } else {
          b.el.setAttribute('x1', b.from.px.toFixed(1)); b.el.setAttribute('y1', b.from.py.toFixed(1));
          b.el.setAttribute('x2', b.to.px.toFixed(1)); b.el.setAttribute('y2', b.to.py.toFixed(1));
        }
      });

      // Milestone branch bonds (from interpolated spine position)
      branchBonds.forEach(function(b) {
        var sp = spinePos(b.milestone.yearFrac);
        b.el.setAttribute('x1', sp.px.toFixed(1)); b.el.setAttribute('y1', sp.py.toFixed(1));
        b.el.setAttribute('x2', b.milestone.px.toFixed(1)); b.el.setAttribute('y2', b.milestone.py.toFixed(1));
      });
    }

    function loop() {
      if (!running) return;
      physics();
      render();
      requestAnimationFrame(loop);
    }

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) { running = false; }
      else { running = true; requestAnimationFrame(loop); }
    });

    render();
    requestAnimationFrame(loop);
  });
})();
</script>
