<script>
(function() {
  'use strict';

  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('methods-pipeline');
    if (!container) return;

    var NS = 'http://www.w3.org/2000/svg';
    var W = 800, H = 240;
    var CY = 65;
    var NODE_R = 28;
    var AMBER = '#d4a03a';

    var stages = [
      { id: 'dft', label: 'DFT / AIMD', x: 100,
        scales: 'fs / \u212B',
        desc: 'Ab initio calculations generate training data with quantum-level accuracy for atomic interactions at solid\u2013liquid interfaces.' },
      { id: 'mlp', label: 'ML Potentials', x: 300,
        scales: 'ps / nm',
        desc: 'Machine-learning interatomic potentials achieve near-DFT accuracy at classical MD cost, enabling large-scale simulations with quantum-level fidelity.' },
      { id: 'md',  label: 'Large-Scale MD', x: 500,
        scales: 'ns / nm\u2013\u03BCm',
        desc: 'Classical and MLP-driven molecular dynamics simulations of millions of atoms over nanosecond timescales resolve interfacial phenomena.' },
      { id: 'cont', label: 'Continuum\nCoupling', x: 700,
        scales: '\u03BCs\u2013s / \u03BCm\u2013m',
        desc: 'Multiscale methods couple molecular simulations with continuum solvers, bridging nanoscale physics to macroscale engineering problems.' }
    ];

    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.width = '100%';
    svg.style.height = 'auto';
    svg.style.display = 'block';
    svg.setAttribute('aria-label', 'Research methods pipeline: DFT, ML Potentials, Large-Scale MD, Continuum Coupling. Tab through stages for details.');

    var defs = document.createElementNS(NS, 'defs');

    // Clip path for icon content
    var clip = document.createElementNS(NS, 'clipPath');
    clip.id = 'mp-badge-clip';
    var clipCirc = document.createElementNS(NS, 'circle');
    clipCirc.setAttribute('r', NODE_R - 2);
    clip.appendChild(clipCirc);
    defs.appendChild(clip);

    // Glow filter
    var gf = document.createElementNS(NS, 'filter');
    gf.id = 'mp-glow';
    gf.setAttribute('x', '-50%'); gf.setAttribute('y', '-50%');
    gf.setAttribute('width', '200%'); gf.setAttribute('height', '200%');
    var gb = document.createElementNS(NS, 'feGaussianBlur');
    gb.setAttribute('in', 'SourceGraphic'); gb.setAttribute('stdDeviation', '4');
    gb.setAttribute('result', 'blur');
    gf.appendChild(gb);
    var gm = document.createElementNS(NS, 'feMerge');
    var gm1 = document.createElementNS(NS, 'feMergeNode'); gm1.setAttribute('in', 'blur'); gm.appendChild(gm1);
    var gm2 = document.createElementNS(NS, 'feMergeNode'); gm2.setAttribute('in', 'SourceGraphic'); gm.appendChild(gm2);
    gf.appendChild(gm);
    defs.appendChild(gf);

    // Arrow marker
    var marker = document.createElementNS(NS, 'marker');
    marker.id = 'mp-arrow';
    marker.setAttribute('viewBox', '0 0 10 6');
    marker.setAttribute('refX', '10'); marker.setAttribute('refY', '3');
    marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '6');
    marker.setAttribute('orient', 'auto');
    var arrowPath = document.createElementNS(NS, 'path');
    arrowPath.setAttribute('d', 'M 0 0 L 10 3 L 0 6 Z');
    arrowPath.setAttribute('fill', 'rgba(212,160,58,0.35)');
    marker.appendChild(arrowPath);
    defs.appendChild(marker);

    svg.appendChild(defs);

    // ===== Icon drawing functions =====

    function drawAtom(parent) {
      var ig = document.createElementNS(NS, 'g');
      ig.setAttribute('clip-path', 'url(#mp-badge-clip)');

      [0, 60, -60].forEach(function(angle) {
        var e = document.createElementNS(NS, 'ellipse');
        e.setAttribute('rx', 20); e.setAttribute('ry', 8);
        e.setAttribute('fill', 'none');
        e.setAttribute('stroke', 'rgba(212,160,58,0.4)');
        e.setAttribute('stroke-width', '1');
        e.setAttribute('transform', 'rotate(' + angle + ')');
        ig.appendChild(e);
      });

      [[18, 0], [-9, 15.6], [-9, -15.6]].forEach(function(p) {
        var c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]);
        c.setAttribute('r', 2.5); c.setAttribute('fill', AMBER);
        ig.appendChild(c);
      });

      var n = document.createElementNS(NS, 'circle');
      n.setAttribute('r', 4); n.setAttribute('fill', AMBER);
      ig.appendChild(n);

      parent.appendChild(ig);
    }

    function drawNetwork(parent) {
      var ig = document.createElementNS(NS, 'g');
      ig.setAttribute('clip-path', 'url(#mp-badge-clip)');

      var layers = [
        [[-16, -10], [-16, 10]],
        [[0, -15], [0, 0], [0, 15]],
        [[16, -10], [16, 10]]
      ];

      for (var i = 0; i < layers.length - 1; i++) {
        layers[i].forEach(function(from) {
          layers[i + 1].forEach(function(to) {
            var l = document.createElementNS(NS, 'line');
            l.setAttribute('x1', from[0]); l.setAttribute('y1', from[1]);
            l.setAttribute('x2', to[0]); l.setAttribute('y2', to[1]);
            l.setAttribute('stroke', 'rgba(212,160,58,0.25)');
            l.setAttribute('stroke-width', '1');
            ig.appendChild(l);
          });
        });
      }

      layers.forEach(function(layer) {
        layer.forEach(function(node) {
          var c = document.createElementNS(NS, 'circle');
          c.setAttribute('cx', node[0]); c.setAttribute('cy', node[1]);
          c.setAttribute('r', 3.5); c.setAttribute('fill', AMBER);
          ig.appendChild(c);
        });
      });

      parent.appendChild(ig);
    }

    function drawParticles(parent) {
      var ig = document.createElementNS(NS, 'g');
      ig.setAttribute('clip-path', 'url(#mp-badge-clip)');

      [
        [-16,-14],[-6,-18],[6,-15],[16,-10],[22,-2],
        [-20,-2],[-12,-8],[0,-6],[10,-10],[18,4],
        [-16,8],[-6,2],[6,8],[16,10],[-14,16],
        [-2,14],[10,18],[18,15],[-6,20],[8,-1],
        [-18,6],[12,0],[2,10],[-10,12],[20,8]
      ].forEach(function(p) {
        var c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]);
        c.setAttribute('r', 2.5);
        c.setAttribute('fill', 'rgba(212,160,58,0.6)');
        ig.appendChild(c);
      });

      parent.appendChild(ig);
    }

    function drawStreamlines(parent) {
      var ig = document.createElementNS(NS, 'g');
      ig.setAttribute('clip-path', 'url(#mp-badge-clip)');

      [-16, -8, 0, 8, 16].forEach(function(y0, i) {
        var amp = 2.5 + Math.abs(y0) * 0.15;
        var path = document.createElementNS(NS, 'path');
        path.setAttribute('d',
          'M -26 ' + y0 +
          ' C -8 ' + (y0 - amp) + ' 8 ' + (y0 + amp) + ' 26 ' + y0
        );
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', 'rgba(212,160,58,' + (0.3 + i * 0.06).toFixed(2) + ')');
        path.setAttribute('stroke-width', '1.2');
        ig.appendChild(path);
      });

      [[-4, -4], [6, 4]].forEach(function(p) {
        var a = document.createElementNS(NS, 'path');
        a.setAttribute('d',
          'M ' + (p[0] - 3) + ' ' + (p[1] - 2.5) +
          ' L ' + (p[0] + 2) + ' ' + p[1] +
          ' L ' + (p[0] - 3) + ' ' + (p[1] + 2.5)
        );
        a.setAttribute('fill', 'none');
        a.setAttribute('stroke', 'rgba(212,160,58,0.45)');
        a.setAttribute('stroke-width', '1');
        a.setAttribute('stroke-linecap', 'round');
        ig.appendChild(a);
      });

      parent.appendChild(ig);
    }

    var iconDrawers = [drawAtom, drawNetwork, drawParticles, drawStreamlines];

    // ===== Conduit lines between stages =====
    for (var i = 0; i < stages.length - 1; i++) {
      var fromX = stages[i].x + NODE_R + 4;
      var toX = stages[i + 1].x - NODE_R - 12;
      var line = document.createElementNS(NS, 'line');
      line.setAttribute('x1', fromX); line.setAttribute('y1', CY);
      line.setAttribute('x2', toX); line.setAttribute('y2', CY);
      line.setAttribute('stroke', 'rgba(212,160,58,0.25)');
      line.setAttribute('stroke-width', '2');
      line.setAttribute('stroke-dasharray', '6 4');
      line.setAttribute('marker-end', 'url(#mp-arrow)');
      line.style.transition = 'stroke 0.3s';
      stages[i].lineOut = line;
      stages[i + 1].lineIn = line;
      svg.appendChild(line);
    }

    // ===== Stage nodes =====
    var tooltip = document.getElementById('methods-tooltip');
    var mtTitle = tooltip.querySelector('.mt-title');
    var mtDesc = tooltip.querySelector('.mt-desc');
    var hoveredStage = null;

    stages.forEach(function(st, idx) {
      var g = document.createElementNS(NS, 'g');
      g.setAttribute('transform', 'translate(' + st.x + ',' + CY + ')');
      g.style.cursor = 'pointer';

      // Glow (hidden by default)
      var glow = document.createElementNS(NS, 'circle');
      glow.setAttribute('r', NODE_R + 6);
      glow.setAttribute('fill', 'rgba(212,160,58,0.2)');
      glow.setAttribute('filter', 'url(#mp-glow)');
      glow.setAttribute('opacity', '0');
      glow.style.transition = 'opacity 0.3s';
      g.appendChild(glow);

      // Badge circle
      var badge = document.createElementNS(NS, 'circle');
      badge.setAttribute('r', NODE_R);
      badge.setAttribute('fill', '#1e1e32');
      badge.setAttribute('stroke', 'rgba(212,160,58,0.25)');
      badge.setAttribute('stroke-width', '1.5');
      badge.style.transition = 'stroke 0.3s';
      g.appendChild(badge);
      st.badgeEl = badge;

      // Draw icon
      iconDrawers[idx](g);

      // Method label
      var lines = st.label.split('\n');
      lines.forEach(function(line, i) {
        var lbl = document.createElementNS(NS, 'text');
        lbl.setAttribute('y', NODE_R + 18 + i * 14);
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('fill', '#e0e0e0');
        lbl.setAttribute('font-family', 'Inter, sans-serif');
        lbl.setAttribute('font-size', '11');
        lbl.setAttribute('font-weight', '600');
        lbl.textContent = line;
        g.appendChild(lbl);
      });

      // Scale annotation
      var scaleText = document.createElementNS(NS, 'text');
      scaleText.setAttribute('y', NODE_R + 18 + lines.length * 14);
      scaleText.setAttribute('text-anchor', 'middle');
      scaleText.setAttribute('fill', '#9898b0');
      scaleText.setAttribute('font-family', 'Inter, sans-serif');
      scaleText.setAttribute('font-size', '9');
      scaleText.textContent = st.scales;
      g.appendChild(scaleText);

      // Hit area
      var hit = document.createElementNS(NS, 'circle');
      hit.setAttribute('r', NODE_R + 8);
      hit.setAttribute('fill', 'transparent');
      g.appendChild(hit);

      st.el = g;
      st.glowEl = glow;

      // Hover handlers
      hit.addEventListener('mouseenter', function(e) {
        hoveredStage = st;
        glow.setAttribute('opacity', '1');
        badge.setAttribute('stroke', 'rgba(212,160,58,0.6)');
        if (st.lineIn) st.lineIn.setAttribute('stroke', 'rgba(212,160,58,0.5)');
        if (st.lineOut) st.lineOut.setAttribute('stroke', 'rgba(212,160,58,0.5)');
        showMethodTip(st, e);
      });
      hit.addEventListener('mousemove', function(e) { showMethodTip(st, e); });
      hit.addEventListener('mouseleave', function() {
        hoveredStage = null;
        glow.setAttribute('opacity', '0');
        badge.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        if (st.lineIn) st.lineIn.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        if (st.lineOut) st.lineOut.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        tooltip.classList.remove('visible');
      });
      hit.addEventListener('touchend', function(e) {
        e.preventDefault();
        var te = e.changedTouches[0];
        glow.setAttribute('opacity', '1');
        badge.setAttribute('stroke', 'rgba(212,160,58,0.6)');
        showMethodTip(st, te);
        setTimeout(function() {
          glow.setAttribute('opacity', '0');
          badge.setAttribute('stroke', 'rgba(212,160,58,0.25)');
          tooltip.classList.remove('visible');
        }, 3000);
      });

      // Keyboard accessibility
      g.setAttribute('tabindex', '0');
      g.setAttribute('role', 'img');
      g.setAttribute('aria-label', st.label.replace('\n', ' ') + ' (' + st.scales + '): ' + st.desc);
      g.addEventListener('focus', function() {
        hoveredStage = st;
        glow.setAttribute('opacity', '1');
        badge.setAttribute('stroke', 'rgba(212,160,58,0.6)');
        if (st.lineIn) st.lineIn.setAttribute('stroke', 'rgba(212,160,58,0.5)');
        if (st.lineOut) st.lineOut.setAttribute('stroke', 'rgba(212,160,58,0.5)');
        var r = g.getBoundingClientRect();
        showMethodTip(st, { clientX: r.left + r.width / 2, clientY: r.top });
      });
      g.addEventListener('blur', function() {
        hoveredStage = null;
        glow.setAttribute('opacity', '0');
        badge.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        if (st.lineIn) st.lineIn.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        if (st.lineOut) st.lineOut.setAttribute('stroke', 'rgba(212,160,58,0.25)');
        tooltip.classList.remove('visible');
      });

      svg.appendChild(g);
    });

    // HPC underpinning badge
    var hpcText = document.createElementNS(NS, 'text');
    hpcText.setAttribute('x', W / 2); hpcText.setAttribute('y', H - 12);
    hpcText.setAttribute('text-anchor', 'middle');
    hpcText.setAttribute('fill', 'rgba(200,200,210,0.3)');
    hpcText.setAttribute('font-family', 'Inter, sans-serif');
    hpcText.setAttribute('font-size', '9');
    hpcText.setAttribute('letter-spacing', '0.08em');
    hpcText.textContent = 'ARCHER2 \u00b7 CIRRUS \u00b7 LOCAL GPU';
    svg.appendChild(hpcText);

    var hpcLine = document.createElementNS(NS, 'line');
    hpcLine.setAttribute('x1', 200); hpcLine.setAttribute('y1', H - 24);
    hpcLine.setAttribute('x2', 600); hpcLine.setAttribute('y2', H - 24);
    hpcLine.setAttribute('stroke', 'rgba(200,200,210,0.08)');
    hpcLine.setAttribute('stroke-width', '1');
    hpcLine.setAttribute('stroke-dasharray', '4 6');
    svg.appendChild(hpcLine);

    container.appendChild(svg);

    function showMethodTip(st, evt) {
      mtTitle.textContent = st.label.replace('\n', ' ');
      mtDesc.textContent = st.desc;
      var rect = container.getBoundingClientRect();
      var tx = evt.clientX - rect.left + 15;
      var ty = evt.clientY - rect.top - 10;
      var tw = tooltip.offsetWidth || 250;
      if (tx + tw > rect.width - 8) tx = evt.clientX - rect.left - tw - 15;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    }
  });
})();
</script>
