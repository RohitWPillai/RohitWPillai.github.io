<script>
(function() {
  'use strict';
  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('service-timeline');
    if (!container) return;

    // ===== Prestige palette =====
    var COLORS = {
      copper: { base: '#c07050', light: '#e8a080', dark: '#784030', border: '#c07050' },
      rose:   { base: '#a87080', light: '#d098a8', dark: '#684050', border: '#a87080' },
      lilac:  { base: '#8878b4', light: '#b098d4', dark: '#584874', border: '#8878b4' },
      slate:  { base: '#5e8db8', light: '#8eb4d8', dark: '#3a5a78', border: '#5e8db8' }
    };

    // ===== Categories and roles =====
    var categories = [
      { title: 'Review & Examination', roles: [
        { title: 'ERC Expert Evaluator', body: 'European Research Council', desc: 'Panel evaluation of Starting and Consolidator Grant proposals across physical sciences and engineering.', period: '2024\u2013present', tier: 'copper' },
        { title: 'EPSRC Peer Review College', body: 'UK Engineering & Physical Sciences Research Council', desc: 'Review proposals and serve on funding panels for UK research grants.', period: '2024\u2013present', tier: 'copper' },
        { title: 'External PhD Examiner', body: 'Imperial College London (2024) \u00b7 Brunel University (2026)', desc: 'Examine doctoral theses and conduct viva voce examinations.', period: '2024\u2013present', tier: 'rose' }
      ]},
      { title: 'Conference Organisation', roles: [
        { title: 'Conference Chair, NEMD 2026', body: '5th NEMD Conference, University of Edinburgh', desc: 'Chair of international conference on non-equilibrium molecular dynamics, covering multiphase flows, heat transfer, nucleation, and machine learning potentials.', period: '6\u201310 July 2026', tier: 'copper' },
        { title: 'NEMD Summer School Director', body: 'University of Edinburgh / ARCHER2', desc: 'Two-day intensive school (40 participants) on NEMD fundamentals and machine learning potentials, with hands-on LAMMPS simulations on ARCHER2.', period: '6\u20137 July 2026', tier: 'rose' },
        { title: 'Organising Committee, MNF 2025', body: 'Micro & Nano Flows Conference', desc: 'Member of organising committee for biennial international conference.', period: '2025', tier: 'lilac' },
        { title: 'Organising Committee, NEMD 2024', body: '3rd NEMD Conference, London', desc: 'Member of organising committee for international conference on non-equilibrium molecular dynamics.', period: '2024', tier: 'lilac' },
        { title: 'Co-organiser, UKFN ECR 2018', body: 'UK Fluids Network Early Career Researcher Event', desc: 'Co-organised networking and skills event for ECRs in fluid mechanics.', period: '2018', tier: 'slate' }
      ]},
      { title: 'Committees & Advocacy', roles: [
        { title: 'PDRA Champion', body: 'School of Engineering, University of Edinburgh', desc: 'Advocate for postdoctoral researchers: welfare, career development, policy input at school level.', period: '2022\u2013present', tier: 'rose' },
        { title: 'Staff Development Co-chair', body: 'School of Engineering, University of Edinburgh', desc: 'Co-chaired committee on staff training, mentoring schemes, and professional development.', period: '2022\u20132024', tier: 'rose' },
        { title: 'People & Culture Committee', body: 'School of Engineering, University of Edinburgh', desc: 'Committee advising on workplace culture, staff wellbeing, and HR policy.', period: 'ongoing', tier: 'slate' },
        { title: 'Diversity & Inclusion Committee', body: 'School of Engineering, University of Edinburgh', desc: 'Athena SWAN action plan, EDI training, and inclusive recruitment practices.', period: 'ongoing', tier: 'slate' }
      ]},
      { title: 'Teaching & Mentoring', roles: [
        { title: 'Course Organiser, Thermofluids 3', body: 'School of Engineering, University of Edinburgh', desc: 'Redesigned third-year undergraduate course: MOOC-style videos, design-focused labs, physical demonstrations.', period: '2020\u20132024', tier: 'copper' },
        { title: 'BEng/MEng Project Supervision', body: 'School of Engineering, University of Edinburgh', desc: '2\u20133 final-year projects annually on molecular dynamics, nanoscale heat transfer, and surface acoustics.', period: '2019\u2013present', tier: 'rose' },
        { title: 'Engineering Mathematics 2A', body: 'School of Engineering, University of Edinburgh', desc: 'Second-year course covering differential equations and linear algebra for engineers.', period: '2018\u20132023', tier: 'lilac' },
        { title: 'Personal Tutoring', body: 'School of Engineering, University of Edinburgh', desc: 'Academic guidance and pastoral support for undergraduate students across all years.', period: '2018\u2013present', tier: 'lilac' }
      ]}
    ];

    // ===== Build HTML cards =====
    var grid = document.createElement('div');
    grid.className = 'service-dossier';

    categories.forEach(function(cat) {
      var col = document.createElement('div');
      col.className = 'dossier-column';

      var heading = document.createElement('div');
      heading.className = 'dossier-heading';
      heading.textContent = cat.title;
      col.appendChild(heading);

      cat.roles.forEach(function(role) {
        var c = COLORS[role.tier];
        var card = document.createElement('div');
        card.className = 'dossier-card';
        card.style.borderLeftColor = c.border;
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'listitem');
        card.setAttribute('aria-label', role.title + ', ' + role.body + ', ' + role.period);

        // Tier dot (only for copper/rose — lead/mid-senior)
        var titleRow = document.createElement('div');
        titleRow.className = 'dc-title-row';
        if (role.tier === 'copper' || role.tier === 'rose') {
          var dot = document.createElement('span');
          dot.className = 'dc-dot';
          dot.style.background = c.base;
          titleRow.appendChild(dot);
        }
        var titleEl = document.createElement('span');
        titleEl.className = 'dc-title';
        titleEl.textContent = role.title;
        titleRow.appendChild(titleEl);

        var periodEl = document.createElement('span');
        periodEl.className = 'dc-period';
        periodEl.textContent = role.period;
        titleRow.appendChild(periodEl);

        card.appendChild(titleRow);

        var bodyEl = document.createElement('div');
        bodyEl.className = 'dc-body';
        bodyEl.textContent = role.body;
        card.appendChild(bodyEl);

        // Expandable detail (shown on hover/focus)
        var detail = document.createElement('div');
        detail.className = 'dc-detail';
        detail.textContent = role.desc;
        card.appendChild(detail);

        col.appendChild(card);
      });

      grid.appendChild(col);
    });

    container.appendChild(grid);
  });
})();
</script>
