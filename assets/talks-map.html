<script>
(function() {
  "use strict";
  document.addEventListener("DOMContentLoaded", function() {
    var container = document.getElementById("talks-map");
    if (!container) return;

    var NS = "http://www.w3.org/2000/svg";
    var W = 900, H = 440;

    /* ── Main Mercator projection ── */
    var LON0 = -138, LON1 = 168;
    var LAT0 = -50, LAT1 = 72;
    var RAD = Math.PI / 180;
    function mercY(lat) { return Math.log(Math.tan(Math.PI / 4 + lat * RAD / 2)); }
    var yTop = mercY(LAT1), yBot = mercY(LAT0), ySpan = yTop - yBot;
    function px(lon) { return (lon - LON0) / (LON1 - LON0) * W; }
    function py(lat) { return (yTop - mercY(lat)) / ySpan * H; }

    /* ── Inset projection: UK & W. Europe (positioned over S. Atlantic / Africa) ── */
    var IX = 280, IY = 220, IW = 320, IH = 200;
    var ILON0 = -12, ILON1 = 14, ILAT0 = 37, ILAT1 = 58;
    var iyTop = mercY(ILAT1), iyBot = mercY(ILAT0), iySpan = iyTop - iyBot;
    function ipx(lon) { return IX + (lon - ILON0) / (ILON1 - ILON0) * IW; }
    function ipy(lat) { return IY + (iyTop - mercY(lat)) / iySpan * IH; }

    /* ── Colours ── */
    var C = {
      land: "rgba(120,136,168,0.07)",
      landStroke: "rgba(120,136,168,0.15)",
      amber: "#d4a03a",   amberL: "#f0d080",   amberD: "#7a5a18",
      teal:  "#4daa88",   tealL:  "#80d0b0",   tealD:  "#2a7060",
      neutral: "#7888a8", neutralL: "#a0aec0",  neutralD: "#4a5a6e",
      amberGlow:   "rgba(212,160,58,0.25)",
      tealGlow:    "rgba(77,170,136,0.25)",
      neutralGlow: "rgba(122,138,158,0.25)"
    };

    /* Determine highest talk type for a city (all items) */
    function cityTier(city) {
      if (city.hub) return "keynote";
      if (city.items.some(function(t) { return t.t === "keynote"; })) return "keynote";
      if (city.items.some(function(t) { return t.t === "invited"; })) return "invited";
      return "conference";
    }

    /* ── Talk data grouped by city ── */
    var cities = [
      { city: "Edinburgh", lat: 55.95, lon: -3.19, hub: true, items: [
        { y: 2023, n: "Boiling & Condensation Heat Transfer", t: "conference", c: 2 },
        { y: 2023, n: "Porous Media Conference", t: "conference" },
        { y: 2017, n: "Industrial Engagement Workshop", t: "invited" }
      ]},
      { city: "London", lat: 51.51, lon: -0.13, items: [
        { y: 2024, n: "UCL Seminar", t: "invited" },
        { y: 2024, n: "UKFN SIG in NEMD", t: "conference", c: 2 },
        { y: 2021, n: "Micro and Nano Flows Conference", t: "conference" }
      ]},
      { city: "Glasgow", lat: 55.86, lon: -4.25, items: [
        { y: 2023, n: "UK Fluids Conference", t: "conference" },
        { y: 2023, n: "Scottish Fluid Mechanics Meeting", t: "conference" },
        { y: 2019, n: "Hewitt\u2013Reese Spring School", t: "keynote" },
        { y: 2019, n: "Univ. of Strathclyde Seminar", t: "invited" },
        { y: 2017, n: "Scottish Fluid Dynamics Meeting", t: "conference" }
      ]},
      { city: "Warwick", lat: 52.38, lon: -1.56, items: [
        { y: 2019, n: "School of Engineering Seminar", t: "invited" },
        { y: 2018, n: "School of Engineering Seminar", t: "invited" }
      ]},
      { city: "Brighton", lat: 50.82, lon: -0.14, items: [
        { y: 2018, n: "Surface Wettability \u00d7 Phase Change", t: "keynote" }
      ]},
      { city: "Swansea", lat: 51.62, lon: -3.94, items: [
        { y: 2024, n: "UK Fluids Conference", t: "conference" }
      ]},
      { city: "Leeds", lat: 53.80, lon: -1.55, items: [
        { y: 2023, n: "Microbubbles and Nanobubbles", t: "conference" }
      ]},
      { city: "Southampton", lat: 50.91, lon: -1.40, items: [
        { y: 2021, n: "UK Fluids Conference", t: "conference" }
      ]},
      { city: "Dundee", lat: 56.46, lon: -2.97, items: [
        { y: 2019, n: "Scottish Fluid Mechanics Meeting", t: "conference" }
      ]},
      { city: "Milan", lat: 45.46, lon: 9.19, items: [
        { y: 2023, n: "Univ. of Milan\u2013Bicocca Seminar", t: "invited" }
      ]},
      { city: "Padova", lat: 45.41, lon: 11.88, items: [
        { y: 2023, n: "Micro and Nano Flows Conference", t: "conference", c: 3 }
      ]},
      { city: "Tuscany", lat: 43.35, lon: 11.25, items: [
        { y: 2027, n: "Gordon Research Conference", t: "keynote" }
      ]},
      { city: "Lisbon", lat: 38.72, lon: -9.14, items: [
        { y: 2022, n: "World Congress on Momentum, Heat & Mass Transfer", t: "conference" }
      ]},
      { city: "Athens", lat: 37.98, lon: 23.73, items: [
        { y: 2022, n: "European Fluid Mechanics Conference", t: "conference" }
      ]},
      { city: "Valencia", lat: 39.47, lon: -0.38, items: [
        { y: 2015, n: "Int. Conf. Computational Methods in Multiphase Flow", t: "conference" }
      ]},
      { city: "Lyon", lat: 45.76, lon: 4.83, items: [
        { y: 2017, n: "Int. Bubble and Drop Workshop", t: "conference" }
      ]},
      { city: "Lausanne", lat: 46.52, lon: 6.63, items: [
        { y: 2019, n: "CECAM 50 Years", t: "conference" }
      ]},
      { city: "Ascona", lat: 46.15, lon: 8.77, items: [
        { y: 2025, n: "Ice at the Micro-scale", t: "conference" }
      ]},
      { city: "Cagliari", lat: 39.22, lon: 9.12, items: [
        { y: 2025, n: "Nanopores Conference", t: "conference" }
      ]},
      { city: "Antalya", lat: 36.90, lon: 30.69, items: [
        { y: 2019, n: "Int. Conf. Parallel CFD", t: "conference" }
      ]},
      { city: "Osaka", lat: 34.69, lon: 135.50, items: [
        { y: 2025, n: "UKFN SIG in NEMD", t: "keynote" },
        { y: 2025, n: "UKFN SIG in NEMD", t: "conference" }
      ]},
      { city: "Kyoto", lat: 35.01, lon: 135.77, items: [
        { y: 2024, n: "NANOBUBBLE 2024", t: "conference" }
      ]},
      { city: "Tokyo", lat: 35.68, lon: 139.69, items: [
        { y: 2025, n: "University of Tokyo Seminar", t: "invited" }
      ]},
      { city: "Tsukuba", lat: 36.08, lon: 140.11, items: [
        { y: 2025, n: "University of Tsukuba Seminar", t: "invited" }
      ]},
      { city: "Fukuoka", lat: 33.59, lon: 130.40, items: [
        { y: 2025, n: "Kyushu University Seminar", t: "invited" }
      ]},
      { city: "Melbourne", lat: -37.81, lon: 144.96, items: [
        { y: 2016, n: "CTAC", t: "conference" },
        { y: 2015, n: "CSIRO CFD Conference", t: "conference" },
        { y: 2014, n: "Australasian Fluid Mechanics Conference", t: "conference" }
      ]},
      { city: "Hobart", lat: -42.88, lon: 147.33, items: [
        { y: 2015, n: "Australian Colloid & Interface Symposium", t: "conference" }
      ]},
      { city: "San Francisco", lat: 37.77, lon: -122.42, items: [
        { y: 2016, n: "AIChE Annual Meeting", t: "conference" }
      ]},
      { city: "Bethlehem", lat: 40.63, lon: -75.37, items: [
        { y: 2025, n: "Bubble Nucleation in Magmatic Systems", t: "invited" }
      ]}
    ];

    /* Online talks (no map marker, included in counts) */
    var onlineTalks = [
      { y: 2022, n: "China University of Petroleum Summer School", t: "keynote" },
      { y: 2020, n: "Sino-Japan-UK Frontiers in Phase Change Heat Transfer", t: "keynote" },
      { y: 2020, n: "APS Division of Fluid Dynamics", t: "conference" }
    ];

    /* Compute totals (for dot sizing — uses all items regardless of year) */
    cities.forEach(function(city) {
      city.total = 0;
      city.items.forEach(function(t) { city.total += (t.c || 1); });
    });

    /* Country mapping */
    var countryMap = {
      "Edinburgh": "UK", "London": "UK", "Glasgow": "UK", "Warwick": "UK",
      "Brighton": "UK", "Swansea": "UK", "Leeds": "UK", "Southampton": "UK", "Dundee": "UK",
      "Milan": "Italy", "Padova": "Italy", "Tuscany": "Italy", "Cagliari": "Italy",
      "Lisbon": "Portugal", "Athens": "Greece", "Valencia": "Spain",
      "Lyon": "France", "Lausanne": "Switzerland", "Ascona": "Switzerland",
      "Antalya": "Turkey",
      "Osaka": "Japan", "Kyoto": "Japan", "Tokyo": "Japan", "Tsukuba": "Japan", "Fukuoka": "Japan",
      "Melbourne": "Australia", "Hobart": "Australia",
      "San Francisco": "USA", "Bethlehem": "USA"
    };

    /* ── Year range from data ── */
    var YEAR_MIN = Infinity, YEAR_MAX = -Infinity;
    cities.forEach(function(c) {
      c.items.forEach(function(t) {
        if (t.y < YEAR_MIN) YEAR_MIN = t.y;
        if (t.y > YEAR_MAX) YEAR_MAX = t.y;
      });
    });
    onlineTalks.forEach(function(t) {
      if (t.y < YEAR_MIN) YEAR_MIN = t.y;
      if (t.y > YEAR_MAX) YEAR_MAX = t.y;
    });
    /* First talk year per city */
    cities.forEach(function(c) {
      c.firstYear = Infinity;
      c.items.forEach(function(t) { if (t.y < c.firstYear) c.firstYear = t.y; });
    });

    var currentYear = YEAR_MAX;
    var AUTOPLAY_DURATION = 12000;
    var AUTOPLAY_DELAY = 800;

    /* ── SVG setup ── */
    var svg = document.createElementNS(NS, "svg");
    svg.setAttribute("viewBox", "0 0 " + W + " " + H);
    svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
    svg.style.width = "100%";
    svg.style.height = "auto";
    svg.style.display = "block";

    /* Radial gradients */
    var defs = document.createElementNS(NS, "defs");
    [
      { id: "tm-amber", stops: [
        { o: "0%", c: C.amberL }, { o: "45%", c: C.amber }, { o: "100%", c: C.amberD }
      ]},
      { id: "tm-teal", stops: [
        { o: "0%", c: C.tealL }, { o: "45%", c: C.teal }, { o: "100%", c: C.tealD }
      ]},
      { id: "tm-neutral", stops: [
        { o: "0%", c: C.neutralL }, { o: "45%", c: C.neutral }, { o: "100%", c: C.neutralD }
      ]}
    ].forEach(function(g) {
      var grad = document.createElementNS(NS, "radialGradient");
      grad.id = g.id;
      grad.setAttribute("cx", "0.35"); grad.setAttribute("cy", "0.35"); grad.setAttribute("r", "0.65");
      g.stops.forEach(function(s) {
        var st = document.createElementNS(NS, "stop");
        st.setAttribute("offset", s.o); st.setAttribute("stop-color", s.c);
        grad.appendChild(st);
      });
      defs.appendChild(grad);
    });
    var hl = document.createElementNS(NS, "radialGradient");
    hl.id = "tm-spec";
    hl.setAttribute("cx", "0.30"); hl.setAttribute("cy", "0.30"); hl.setAttribute("r", "0.40");
    [{ o: "0%", a: "0.45" }, { o: "30%", a: "0.12" }, { o: "100%", a: "0" }].forEach(function(s) {
      var st = document.createElementNS(NS, "stop");
      st.setAttribute("offset", s.o); st.setAttribute("stop-color", "white"); st.setAttribute("stop-opacity", s.a);
      hl.appendChild(st);
    });
    defs.appendChild(hl);

    /* Inset clip path */
    var iclip = document.createElementNS(NS, "clipPath");
    iclip.id = "inset-clip";
    var icr = document.createElementNS(NS, "rect");
    icr.setAttribute("x", IX); icr.setAttribute("y", IY);
    icr.setAttribute("width", IW); icr.setAttribute("height", IH);
    icr.setAttribute("rx", "6");
    iclip.appendChild(icr);
    defs.appendChild(iclip);

    svg.appendChild(defs);

    /* Layer groups */
    var landGroup = document.createElementNS(NS, "g");
    var dotsGroup = document.createElementNS(NS, "g");
    var insetGroup = document.createElementNS(NS, "g");
    svg.appendChild(landGroup);
    svg.appendChild(dotsGroup);
    svg.appendChild(insetGroup);

    /* ── Tooltip ── */
    container.style.position = "relative";
    var tip = document.createElement("div");
    tip.className = "talks-tooltip";
    container.appendChild(tip);

    function showTip(city, evt) {
      /* Filter items by current year */
      var visibleItems = city.items.filter(function(t) { return t.y <= currentYear; });
      if (!visibleItems.length) return;
      var visibleTotal = 0;
      visibleItems.forEach(function(t) { visibleTotal += (t.c || 1); });

      var tier = cityTier(city);
      var accent = tier === "keynote" ? C.amber : tier === "invited" ? C.teal : C.neutral;
      var html = '<div class="tt-city" style="color:' + accent + '">' + city.city;
      if (visibleTotal > 1) html += ' <span class="tt-count">' + visibleTotal + " talks</span>";
      html += "</div>";
      var sorted = visibleItems.slice().sort(function(a, b) { return b.y - a.y; });
      sorted.forEach(function(t) {
        var label = t.t === "keynote" ? "keynote" : t.t === "invited" ? "invited" : "";
        var countStr = t.c && t.c > 1 ? " (" + t.c + " papers)" : "";
        html += '<div class="tt-row">';
        html += '<span class="tt-year">' + t.y + "</span> ";
        html += '<span class="tt-name">' + t.n + countStr + "</span>";
        if (label) html += ' <span class="tt-type tt-type-' + t.t + '">' + label + "</span>";
        html += "</div>";
      });
      tip.innerHTML = html;
      tip.classList.add("visible");

      var rect = container.getBoundingClientRect();
      var cx = evt.clientX - rect.left, cy = evt.clientY - rect.top;
      var left = cx + 14, top = cy - 10;
      var tw = tip.offsetWidth, th = tip.offsetHeight;
      if (left + tw > rect.width - 8) left = cx - tw - 14;
      if (top + th > rect.height - 8) top = rect.height - th - 8;
      if (top < 4) top = 4;
      tip.style.left = left + "px";
      tip.style.top = top + "px";
    }

    function hideTip() { tip.classList.remove("visible"); }

    /* ── Shared dot builder (returns group element, starts hidden) ── */
    function makeDot(parent, city, x, y, baseR, showLabel) {
      var g = document.createElementNS(NS, "g");
      g.setAttribute("transform", "translate(" + x.toFixed(1) + "," + y.toFixed(1) + ")");
      g.style.cursor = "pointer";
      g.style.opacity = "0";
      g.style.transition = "opacity 0.4s";

      var tier = cityTier(city);
      var fillId = tier === "keynote" ? "url(#tm-amber)" : tier === "invited" ? "url(#tm-teal)" : "url(#tm-neutral)";
      var glowColor = tier === "keynote" ? C.amberGlow : tier === "invited" ? C.tealGlow : C.neutralGlow;

      /* Scale radius with talk count (hub keeps fixed size) */
      var r = city.hub ? baseR : baseR * (0.65 + 0.35 * Math.sqrt(city.total));

      /* Outer ring for 3+ talks */
      if (city.total >= 3) {
        var ring = document.createElementNS(NS, "circle");
        ring.setAttribute("r", String(r * 2.0));
        ring.setAttribute("fill", "none");
        var ringStroke = tier === "keynote" ? "rgba(212,160,58,0.20)" : tier === "invited" ? "rgba(77,170,136,0.20)" : "rgba(122,138,158,0.20)";
        ring.setAttribute("stroke", ringStroke);
        ring.setAttribute("stroke-width", "0.7");
        ring.setAttribute("stroke-dasharray", "2 2");
        g.appendChild(ring);
      }

      /* Glow */
      var glow = document.createElementNS(NS, "circle");
      glow.setAttribute("r", String(r * 2.5));
      glow.setAttribute("fill", glowColor);
      glow.setAttribute("opacity", "0");
      glow.style.transition = "opacity 0.2s";
      g.appendChild(glow);

      /* Sphere */
      var c = document.createElementNS(NS, "circle");
      c.setAttribute("r", String(r));
      c.setAttribute("fill", fillId);
      g.appendChild(c);

      /* Specular */
      var sp = document.createElementNS(NS, "circle");
      sp.setAttribute("r", String(r));
      sp.setAttribute("fill", "url(#tm-spec)");
      g.appendChild(sp);

      /* Hit area */
      var hit = document.createElementNS(NS, "circle");
      hit.setAttribute("r", String(Math.max(r * 2.5, 10)));
      hit.setAttribute("fill", "transparent");
      g.appendChild(hit);

      /* Label */
      if (showLabel) {
        var lbl = document.createElementNS(NS, "text");
        lbl.setAttribute("x", String(r + 5)); lbl.setAttribute("y", "4");
        lbl.setAttribute("text-anchor", "start");
        lbl.setAttribute("fill", C.amber);
        lbl.setAttribute("font-family", '"Fraunces", serif');
        lbl.setAttribute("font-size", "11");
        lbl.textContent = city.city;
        g.appendChild(lbl);
      }

      hit.addEventListener("mouseenter", function(e) {
        glow.setAttribute("opacity", "1"); showTip(city, e);
      });
      hit.addEventListener("mousemove", function(e) { showTip(city, e); });
      hit.addEventListener("mouseleave", function() {
        glow.setAttribute("opacity", "0"); hideTip();
      });
      hit.addEventListener("touchend", function(e) {
        e.preventDefault();
        var te = e.changedTouches[0];
        glow.setAttribute("opacity", "1"); showTip(city, te);
        setTimeout(function() { glow.setAttribute("opacity", "0"); hideTip(); }, 3000);
      });

      parent.appendChild(g);
      return g;
    }

    /* ── Topojson decode ── */
    function topoRings(topo, name) {
      var obj = topo.objects[name];
      var tf = topo.transform;
      var sx = tf.scale[0], sy = tf.scale[1], tx = tf.translate[0], ty = tf.translate[1];
      var arcs = topo.arcs.map(function(arc) {
        var x = 0, y = 0;
        return arc.map(function(d) {
          x += d[0]; y += d[1];
          return [x * sx + tx, y * sy + ty];
        });
      });
      function resolve(indices) {
        var coords = [];
        indices.forEach(function(i) {
          var a = i >= 0 ? arcs[i].slice() : arcs[~i].slice().reverse();
          if (coords.length) a = a.slice(1);
          coords = coords.concat(a);
        });
        return coords;
      }
      var rings = [];
      (function walk(geom) {
        if (geom.type === "GeometryCollection") {
          geom.geometries.forEach(walk);
        } else if (geom.type === "Polygon") {
          geom.arcs.forEach(function(r) { rings.push(resolve(r)); });
        } else if (geom.type === "MultiPolygon") {
          geom.arcs.forEach(function(p) { p.forEach(function(r) { rings.push(resolve(r)); }); });
        }
      })(obj);
      return rings;
    }

    function ringsToPath(rings, projX, projY) {
      var d = "";
      var BREAK = 200; /* pixel jump threshold for antimeridian wrap */
      rings.forEach(function(ring) {
        var prevX = null;
        ring.forEach(function(p, i) {
          var x = projX(p[0]), y = projY(p[1]);
          if (prevX === null || Math.abs(x - prevX) > BREAK) {
            if (prevX !== null) d += "Z";
            d += "M" + x.toFixed(1) + "," + y.toFixed(1);
          } else {
            d += "L" + x.toFixed(1) + "," + y.toFixed(1);
          }
          prevX = x;
        });
        d += "Z";
      });
      return d;
    }

    /* ── Draw main land ── */
    function drawLand(rings) {
      var path = document.createElementNS(NS, "path");
      path.setAttribute("d", ringsToPath(rings, px, py));
      path.setAttribute("fill", C.land);
      path.setAttribute("stroke", C.landStroke);
      path.setAttribute("stroke-width", "0.5");
      landGroup.appendChild(path);
    }

    /* ── Draw main dots (store references) ── */
    function renderDots() {
      cities.forEach(function(city) {
        var baseR = city.hub ? 6 : 3.5;
        city.mainDot = makeDot(dotsGroup, city, px(city.lon), py(city.lat), baseR, false);
      });
    }

    /* ── Draw inset: UK & Europe (store dot references) ── */
    function drawInset(rings) {
      /* Background */
      var bg = document.createElementNS(NS, "rect");
      bg.setAttribute("x", IX); bg.setAttribute("y", IY);
      bg.setAttribute("width", IW); bg.setAttribute("height", IH);
      bg.setAttribute("fill", "#1a1a2e"); bg.setAttribute("rx", "6");
      insetGroup.appendChild(bg);

      /* Land clipped to inset */
      var clipped = document.createElementNS(NS, "g");
      clipped.setAttribute("clip-path", "url(#inset-clip)");
      var lp = document.createElementNS(NS, "path");
      lp.setAttribute("d", ringsToPath(rings, ipx, ipy));
      lp.setAttribute("fill", "rgba(120,136,168,0.10)");
      lp.setAttribute("stroke", "rgba(120,136,168,0.20)");
      lp.setAttribute("stroke-width", "0.5");
      clipped.appendChild(lp);
      insetGroup.appendChild(clipped);

      /* European city dots */
      var insetDots = document.createElementNS(NS, "g");
      insetDots.setAttribute("clip-path", "url(#inset-clip)");
      cities.forEach(function(city) {
        if (city.lat < ILAT0 || city.lat > ILAT1 ||
            city.lon < ILON0 || city.lon > ILON1) return;
        var baseR = city.hub ? 6 : 3.5;
        city.insetDot = makeDot(insetDots, city, ipx(city.lon), ipy(city.lat), baseR, city.hub);
      });
      insetGroup.appendChild(insetDots);

      /* Border */
      var border = document.createElementNS(NS, "rect");
      border.setAttribute("x", IX); border.setAttribute("y", IY);
      border.setAttribute("width", IW); border.setAttribute("height", IH);
      border.setAttribute("fill", "none");
      border.setAttribute("stroke", "rgba(212,160,58,0.25)");
      border.setAttribute("stroke-width", "1");
      border.setAttribute("rx", "6");
      insetGroup.appendChild(border);

      /* "UK & Europe" label */
      var label = document.createElementNS(NS, "text");
      label.setAttribute("x", String(IX + 8)); label.setAttribute("y", String(IY + IH - 8));
      label.setAttribute("fill", "rgba(136,136,152,0.5)");
      label.setAttribute("font-family", "Inter, sans-serif");
      label.setAttribute("font-size", "9");
      label.textContent = "UK & Europe";
      insetGroup.appendChild(label);

      /* Source indicator on main map */
      var sx1 = px(ILON0), sy1 = py(ILAT1), sx2 = px(ILON1), sy2 = py(ILAT0);
      var src = document.createElementNS(NS, "rect");
      src.setAttribute("x", sx1.toFixed(1)); src.setAttribute("y", sy1.toFixed(1));
      src.setAttribute("width", (sx2 - sx1).toFixed(1));
      src.setAttribute("height", (sy2 - sy1).toFixed(1));
      src.setAttribute("fill", "none");
      src.setAttribute("stroke", "rgba(212,160,58,0.12)");
      src.setAttribute("stroke-width", "0.5");
      src.setAttribute("stroke-dasharray", "3 2");
      landGroup.appendChild(src);

      /* Connecting lines (source bottom → inset top) */
      [[sx1, sy2, IX, IY], [sx2, sy2, IX + IW, IY]].forEach(function(p) {
        var ln = document.createElementNS(NS, "line");
        ln.setAttribute("x1", p[0].toFixed(1)); ln.setAttribute("y1", p[1].toFixed(1));
        ln.setAttribute("x2", String(p[2])); ln.setAttribute("y2", String(p[3]));
        ln.setAttribute("stroke", "rgba(212,160,58,0.10)");
        ln.setAttribute("stroke-width", "0.5");
        ln.setAttribute("stroke-dasharray", "4 3");
        landGroup.appendChild(ln);
      });
    }

    /* ── Dynamic legend + summary ── */
    var legendSpans = {};
    var summaryEl = null;

    function addLegend() {
      var legend = document.createElement("div");
      legend.className = "talks-legend";
      [
        { key: "keynote", color: C.amber },
        { key: "invited", color: C.teal },
        { key: "conference", color: C.neutral }
      ].forEach(function(item) {
        var span = document.createElement("span");
        span.className = "legend-item";
        var dot = document.createElement("span");
        dot.className = "legend-dot";
        dot.style.background = item.color;
        span.appendChild(dot);
        var textNode = document.createTextNode("");
        span.appendChild(textNode);
        legend.appendChild(span);
        legendSpans[item.key] = textNode;
      });
      container.appendChild(legend);

      summaryEl = document.createElement("div");
      summaryEl.className = "talks-summary";
      container.appendChild(summaryEl);
    }

    function updateCounts() {
      var counts = { keynote: 0, invited: 0, conference: 0 };
      var visibleCities = 0;
      var visibleCountries = {};
      cities.forEach(function(city) {
        var hasTalk = false;
        city.items.forEach(function(t) {
          if (t.y <= currentYear) {
            counts[t.t] += (t.c || 1);
            hasTalk = true;
          }
        });
        if (hasTalk) {
          visibleCities++;
          visibleCountries[countryMap[city.city] || city.city] = true;
        }
      });
      var onlineCount = 0;
      onlineTalks.forEach(function(t) {
        if (t.y <= currentYear) {
          counts[t.t] += 1;
          onlineCount++;
        }
      });

      var total = counts.keynote + counts.invited + counts.conference;
      var numCountries = Object.keys(visibleCountries).length;

      if (legendSpans.keynote) {
        legendSpans.keynote.textContent = "Keynote (" + counts.keynote + ")";
        legendSpans.invited.textContent = "Invited (" + counts.invited + ")";
        legendSpans.conference.textContent = "Conference (" + counts.conference + ")";
      }
      if (summaryEl) {
        summaryEl.textContent = total + " presentations \u00b7 " + visibleCities + " cities \u00b7 " + numCountries + " countries" + (onlineCount ? " \u00b7 " + onlineCount + " online" : "");
      }
    }

    /* ── Year update: show/hide dots, update counts ── */
    function updateForYear(year) {
      currentYear = year;
      cities.forEach(function(city) {
        var visible = city.firstYear <= year;
        if (city.mainDot) city.mainDot.style.opacity = visible ? "1" : "0";
        if (city.insetDot) city.insetDot.style.opacity = visible ? "1" : "0";
      });
      updateCounts();
    }

    /* ── Controls ── */
    var slider = document.getElementById("talks-year-slider");
    var yearDisplay = document.getElementById("talks-year-display");
    var playBtn = document.getElementById("talks-play-btn");

    function formatYear(y) {
      return String(Math.floor(y));
    }

    if (slider) {
      slider.min = YEAR_MIN;
      slider.max = YEAR_MAX;
      slider.value = YEAR_MIN;
      slider.setAttribute("step", "0.5");
      slider.addEventListener("input", function() {
        var year = parseFloat(this.value);
        if (yearDisplay) yearDisplay.textContent = formatYear(year);
        updateForYear(year);
      });
    }
    if (yearDisplay) yearDisplay.textContent = formatYear(YEAR_MIN);

    /* ── Auto-play ── */
    var autoPlaying = false;

    function runTimeline(fromYear) {
      var startY = fromYear != null ? fromYear : YEAR_MIN;
      autoPlaying = true;
      updateForYear(startY);
      if (slider) slider.value = startY;
      if (yearDisplay) yearDisplay.textContent = formatYear(startY);
      if (playBtn) playBtn.classList.add("playing");
      var span = YEAR_MAX - startY;
      if (span <= 0) { autoPlaying = false; if (playBtn) playBtn.classList.remove("playing"); return; }
      var duration = AUTOPLAY_DURATION * (span / (YEAR_MAX - YEAR_MIN));
      var autoStart = null;
      function autoStep(timestamp) {
        if (!autoPlaying) { if (playBtn) playBtn.classList.remove("playing"); return; }
        if (!autoStart) autoStart = timestamp;
        var t = Math.min(1, (timestamp - autoStart) / duration);
        var eased = 1 - Math.pow(1 - t, 2);
        var year = Math.round((startY + eased * span) * 2) / 2;
        if (slider) slider.value = year;
        if (yearDisplay) yearDisplay.textContent = formatYear(year);
        updateForYear(year);
        if (t < 1) requestAnimationFrame(autoStep);
        else { autoPlaying = false; if (playBtn) playBtn.classList.remove("playing"); }
      }
      requestAnimationFrame(autoStep);
    }

    if (slider) {
      slider.addEventListener("pointerdown", function() {
        autoPlaying = false;
        if (playBtn) playBtn.classList.remove("playing");
      });
    }

    if (playBtn) {
      playBtn.addEventListener("click", function() {
        if (autoPlaying) { autoPlaying = false; playBtn.classList.remove("playing"); return; }
        var cur = slider ? parseInt(slider.value, 10) : YEAR_MIN;
        runTimeline(cur >= YEAR_MAX ? YEAR_MIN : cur);
      });
    }

    /* ── Init ── */
    container.appendChild(svg);

    fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json")
      .then(function(r) { return r.json(); })
      .then(function(topo) {
        var rings = topoRings(topo, "land");
        drawLand(rings);
        renderDots();
        drawInset(rings);
        addLegend();
        updateForYear(YEAR_MIN);
        setTimeout(function() { runTimeline(); }, AUTOPLAY_DELAY);
      })
      .catch(function() {
        renderDots();
        addLegend();
        updateForYear(YEAR_MAX);
      });
  });
})();
</script>
