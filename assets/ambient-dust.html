<script>
(function() {
  'use strict';

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  document.addEventListener('DOMContentLoaded', function() {
    if (document.querySelector('.quarto-about-solana')) return;

    var CACHE_PX = 64;
    var N = 30;
    var R = 4;  // matches homepage CFG.fluidR

    // Same Phong sphere renderer as homepage simulation
    function buildSphere(c, sz) {
      var oc = document.createElement('canvas');
      oc.width = sz; oc.height = sz;
      var ox = oc.getContext('2d');
      var cx = sz / 2, cy = sz / 2, r = sz / 2 - 1;

      var lo = [Math.max(0, c[0] - 55), Math.max(0, c[1] - 55), Math.max(0, c[2] - 55)];
      var mid = [Math.min(255, c[0] + 15), Math.min(255, c[1] + 15), Math.min(255, c[2] + 15)];
      var g1 = ox.createRadialGradient(cx - r * 0.15, cy - r * 0.15, 0, cx, cy, r);
      g1.addColorStop(0,   'rgb(' + mid[0] + ',' + mid[1] + ',' + mid[2] + ')');
      g1.addColorStop(0.6, 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')');
      g1.addColorStop(1,   'rgb(' + lo[0] + ',' + lo[1] + ',' + lo[2] + ')');
      ox.beginPath(); ox.arc(cx, cy, r, 0, Math.PI * 2);
      ox.fillStyle = g1; ox.fill();

      var g2 = ox.createRadialGradient(cx, cy, r * 0.55, cx, cy, r);
      g2.addColorStop(0, 'rgba(0,0,0,0)');
      g2.addColorStop(0.7, 'rgba(0,0,0,0.04)');
      g2.addColorStop(1, 'rgba(0,0,0,0.32)');
      ox.beginPath(); ox.arc(cx, cy, r, 0, Math.PI * 2);
      ox.fillStyle = g2; ox.fill();

      var hx = cx - r * 0.32, hy = cy - r * 0.34;
      var g3 = ox.createRadialGradient(hx, hy, 0, hx, hy, r * 0.45);
      g3.addColorStop(0,    'rgba(255,255,255,0.92)');
      g3.addColorStop(0.12, 'rgba(255,255,255,0.55)');
      g3.addColorStop(0.4,  'rgba(255,255,255,0.10)');
      g3.addColorStop(1,    'rgba(255,255,255,0)');
      ox.beginPath(); ox.arc(cx, cy, r, 0, Math.PI * 2);
      ox.fillStyle = g3; ox.fill();

      var rlx = cx + r * 0.4, rly = cy + r * 0.38;
      var g4 = ox.createRadialGradient(rlx, rly, r * 0.6, rlx, rly, r);
      g4.addColorStop(0, 'rgba(255,255,255,0)');
      g4.addColorStop(0.6, 'rgba(255,255,255,0.06)');
      g4.addColorStop(1, 'rgba(255,255,255,0)');
      ox.beginPath(); ox.arc(cx, cy, r, 0, Math.PI * 2);
      ox.fillStyle = g4; ox.fill();

      return oc;
    }

    // Build a few colour variants (depth gradient like homepage)
    var colours = [
      [220, 65, 45],     // vapour red
      [220, 65, 45],     // vapour red
      [220, 65, 45],     // vapour red
      [200, 75, 55],     // vapour red (slightly varied)
      [230, 55, 40]      // vapour red (slightly varied)
    ];
    var sprites = [];
    for (var i = 0; i < colours.length; i++) {
      sprites.push(buildSphere(colours[i], CACHE_PX));
    }

    var canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;z-index:10;pointer-events:none;';
    canvas.setAttribute('aria-hidden', 'true');
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    // Trail modes: 0=off, 1=no trail (default), 2=fading trail, 3=permanent trail
    var TRAIL_CONFIGS = [
      { len: 0, alpha: 0, fade: false },       // 0: particles off
      { len: 0, alpha: 0, fade: false },       // 1: no trail
      { len: 120, alpha: 0.12, fade: true },   // 2: fading trail
      { len: Infinity, alpha: 0.08, fade: false } // 3: permanent trail
    ];
    var trailWidth = 1.0;

    var W, H, dpr;
    var particles = [];

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function init() {
      resize();
      particles = [];
      for (var i = 0; i < N; i++) {
        particles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 1.2,
          vy: (Math.random() - 0.5) * 1.2,
          trail: [],
          sprite: sprites[Math.floor(Math.random() * sprites.length)],
          colIdx: Math.floor(Math.random() * colours.length),
          r: R,
          alpha: 0.45 + Math.random() * 0.25
        });
      }
    }

    var running = true;

    function loop() {
      loopScheduled = false;
      if (!running) return;
      ctx.clearRect(0, 0, W, H);

      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        // Store position in trail buffer
        var tc = TRAIL_CONFIGS[dustMode];
        if (tc.len > 0) {
          p.trail.push({ x: p.x, y: p.y });
          if (tc.len !== Infinity && p.trail.length > tc.len) p.trail.shift();
        }

        // Same Brownian thermostat as homepage: kick 0.6, damping 0.88
        p.vx += (Math.random() - 0.5) * 1.2;
        p.vy += (Math.random() - 0.5) * 1.2;
        p.vx *= 0.88;
        p.vy *= 0.88;
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < -20) p.x = W + 20;
        if (p.x > W + 20) p.x = -20;
        if (p.y < -20) p.y = H + 20;
        if (p.y > H + 20) p.y = -20;

        // Draw trail segments
        var c = colours[p.colIdx];
        var tc = TRAIL_CONFIGS[dustMode];
        if (tc.alpha > 0 && p.trail.length > 1) {
          ctx.lineWidth = trailWidth;
          ctx.lineCap = 'round';
          for (var j = 1; j < p.trail.length; j++) {
            var t0 = p.trail[j - 1], t1 = p.trail[j];
            if (Math.abs(t1.x - t0.x) > W * 0.3 || Math.abs(t1.y - t0.y) > H * 0.3) continue;
            var a = tc.fade ? tc.alpha * (j / p.trail.length) : tc.alpha;
            ctx.strokeStyle = 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + a + ')';
            ctx.beginPath();
            ctx.moveTo(t0.x, t0.y);
            ctx.lineTo(t1.x, t1.y);
            ctx.stroke();
          }
        }

        // Draw particle
        ctx.globalAlpha = p.alpha;
        var d = p.r * 2;
        ctx.drawImage(p.sprite, p.x - p.r, p.y - p.r, d, d);
      }
      ctx.globalAlpha = 1;

      loopScheduled = true;
      requestAnimationFrame(loop);
    }

    /* Toggle button — 4 modes: 0=off, 1=no trail (default), 2=fading trail, 3=permanent trail */
    var PREF_KEY = 'ambient-dust-v3';
    var MODE_LABELS = ['Off', 'Particles', 'Trails', 'Permanent'];
    var stored = parseInt(localStorage.getItem(PREF_KEY), 10);
    var dustMode = (stored >= 0 && stored <= 3) ? stored : 1;

    var btn = document.createElement('button');
    btn.className = 'ambient-toggle';
    btn.setAttribute('aria-label', 'Cycle particle mode');
    /* Inline SVG atom icon — three elliptical orbits + central dot */
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/><ellipse cx="12" cy="12" rx="10" ry="4"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/></svg>';
    /* Insert into navbar-tools (right side, left of search icon) */
    var toolsEl = document.querySelector('.quarto-navbar-tools');
    if (toolsEl) {
      toolsEl.appendChild(btn);
    } else {
      var searchEl = document.getElementById('quarto-search');
      if (searchEl) searchEl.parentNode.insertBefore(btn, searchEl);
    }

    function clearTrails() {
      particles.forEach(function(p) { p.trail = []; });
    }

    var loopScheduled = false;

    function applyState() {
      var off = dustMode === 0;
      canvas.style.display = off ? 'none' : '';
      running = !off;
      btn.classList.toggle('off', off);
      btn.title = MODE_LABELS[dustMode];
      if (dustMode <= 1) clearTrails();
      if (running && !loopScheduled) {
        loopScheduled = true;
        requestAnimationFrame(loop);
      }
    }

    btn.addEventListener('click', function() {
      dustMode = (dustMode + 1) % 4;
      localStorage.setItem(PREF_KEY, dustMode);
      applyState();
    });

    init();
    window.addEventListener('resize', resize);

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        running = false;
      } else if (dustMode > 0) {
        running = true;
        if (!loopScheduled) {
          loopScheduled = true;
          requestAnimationFrame(loop);
        }
      }
    });

    applyState();
  });
})();
</script>
