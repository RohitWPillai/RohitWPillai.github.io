<script>
(function() {
  'use strict';

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('research-diagram');
    if (!container) return;

    var NS = 'http://www.w3.org/2000/svg';

    // ===== Key coordinates =====
    var TP = { x: 300, y: 330 };
    var CP = { x: 620, y: 130 };
    var FT = { x: 280, y: 45 };

    var SUBLIMATION  = 'M 80 450 Q 190 400 ' + TP.x + ' ' + TP.y;
    var FUSION       = 'M ' + TP.x + ' ' + TP.y + ' Q 290 180 ' + FT.x + ' ' + FT.y;
    var VAPORIZATION = 'M ' + TP.x + ' ' + TP.y + ' C 380 290 500 200 ' + CP.x + ' ' + CP.y;

    var SOLID_FILL  = 'M 80 40 L ' + FT.x + ' ' + FT.y + ' Q 290 180 ' + TP.x + ' ' + TP.y + ' Q 190 400 80 450 Z';
    var LIQUID_FILL = 'M ' + FT.x + ' ' + FT.y + ' L 750 40 L 750 130 L ' + CP.x + ' ' + CP.y + ' C 500 200 380 290 ' + TP.x + ' ' + TP.y + ' Q 290 180 ' + FT.x + ' ' + FT.y + ' Z';
    var VAPOR_FILL  = 'M 80 460 L 80 450 Q 190 400 ' + TP.x + ' ' + TP.y + ' C 380 290 500 200 ' + CP.x + ' ' + CP.y + ' L 750 130 L 750 460 Z';

    // ===== Research themes =====
    var themes = [
      { id: 'ice', label: 'Ice Nucleation and Growth', x: 175, y: 220,
        desc: 'Supercooled water: ice nucleation on surfaces, vibration effects, icephobic design',
        boundary: 'fusion',
        narrative: 'Understanding how ice forms at the nanoscale is crucial for designing surfaces that prevent icing on aircraft, wind turbines, and infrastructure. We use molecular dynamics to study heterogeneous ice nucleation on different surface chemistries, the role of surface vibrations in suppressing or promoting freezing, and the design principles behind icephobic coatings.',
        papers: [
          { num: 17, title: 'Vibration-induced ice nucleation', journal: 'Nanoscale', year: 2025, img: 'images/papers/17-ice-nucleation-vibration.jpg', doi: 'https://doi.org/10.1039/D5NR00326A' },
          { num: 9, title: 'Ice physics on nanostructured surfaces', journal: 'J. Chem. Phys.', year: 2021, img: 'images/papers/09-ice-nanostructure.jpg', doi: 'https://doi.org/10.1063/5.0069896' },
          { num: 'B1', title: 'Icephobic surfaces: bridging experiments and simulations', journal: 'Springer', year: 2022, img: 'images/papers/book-icephobic-surfaces.jpg', doi: 'https://doi.org/10.1007/978-3-030-82992-6_8' }
        ]
      },
      { id: 'heat', label: 'Interfacial Thermofluids', x: 470, y: 140,
        desc: 'Thermal conductance at solid\u2013liquid interfaces, surface wetting and self-cleaning, nanomaterial-enhanced cooling',
        boundary: 'fusion',
        narrative: 'The behaviour of liquids at solid surfaces governs both heat transfer and fluid transport at the nanoscale. We investigate spectral mechanisms of interfacial thermal conductance and nanomaterial-enhanced cooling strategies through our ERC-funded NANO-COOL programme, alongside the interfacial fluid dynamics that drive phenomena like contaminant removal from nature\u2019s self-cleaning surfaces.',
        papers: [
          { num: 'P', title: 'Liquid utilisation bottleneck in interfacial thermal conductance', journal: 'Preprint', year: 2026, img: 'images/papers/preprint-liquid-utilisation.jpg', doi: 'https://papers.ssrn.com/sol3/papers.cfm?abstract_id=6479492' },
          { num: 20, title: 'Contaminant removal via vibrating surfaces', journal: 'Nano Lett.', year: 2025, img: 'images/papers/20-contaminant-vibrating.jpg', doi: 'https://doi.org/10.1021/acs.nanolett.4c05973' },
          { num: 19, title: 'Spectral heat transfer with a meniscus', journal: 'Phys. Chem. Chem. Phys.', year: 2025, img: 'images/papers/19-spectral-meniscus.jpg', doi: 'https://doi.org/10.1039/D4CP04768K' },
          { num: 16, title: 'Regimes of interfacial thermal conductance', journal: 'J. Phys. Chem. C', year: 2024, img: 'images/papers/16-thermal-conductance.jpeg', doi: 'https://doi.org/10.1021/acs.jpcc.4c00536' },
          { num: 14, title: 'Rolling and sliding nanodroplet spreading', journal: 'Phys. Rev. Lett.', year: 2023, img: 'images/papers/14-rolling-sliding.png', doi: 'https://doi.org/10.1103/PhysRevLett.131.164001' },
          { num: 13, title: 'Contaminant removal from self-cleaning surfaces', journal: 'Nano Lett.', year: 2023, img: 'images/papers/13-self-cleaning.jpg', doi: 'https://doi.org/10.1021/acs.nanolett.3c00257' },
          { num: 10, title: 'Water transport in boron nitride nanotubes', journal: 'Nanoscale', year: 2021, img: 'images/papers/10-bnnt-water.png', doi: 'https://doi.org/10.1039/D1NR04794A' },
          { num: 7, title: 'Nanodroplets on vibrating surfaces', journal: 'Langmuir', year: 2018, img: 'images/papers/07-nanodroplet-vibrating.png', doi: 'https://doi.org/10.1021/acs.langmuir.8b02066' }
        ]
      },
      { id: 'boil', label: 'Phase Change and\nBubble Dynamics', x: 510, y: 370,
        desc: 'Superheated liquid: vapour bubble nucleation, wettability effects, acoustothermal dynamics',
        boundary: 'vapor',
        narrative: 'Phase change at surfaces is central to cooling technologies from electronics to nuclear reactors. We study the molecular mechanisms of heterogeneous vapour bubble nucleation, how surface wettability controls bubble growth dynamics, and acoustically-driven nanobubble formation, bridging atomistic simulations with continuum theory.',
        papers: [
          { num: 18, title: 'Surface effects on bubble nucleation', journal: 'J. Chem. Phys.', year: 2025, img: 'images/papers/18-bubble-nucleation-surface.png', doi: 'https://doi.org/10.1063/5.0259208' },
          { num: 15, title: 'Wettability and vapour bubble growth', journal: 'Int. J. Heat Mass Transf.', year: 2023, img: 'images/papers/15-bubble-wettability.jpg', doi: 'https://doi.org/10.1016/j.ijheatmasstransfer.2023.124657' },
          { num: 12, title: 'Inertio-thermal bubble growth', journal: 'J. Fluid Mech.', year: 2022, img: 'images/papers/12-inertio-thermal-bubble.png', doi: 'https://doi.org/10.1017/jfm.2022.734' },
          { num: 11, title: 'Acoustothermal nanobubbles', journal: 'Nano Lett.', year: 2021, img: 'images/papers/11-nanobubble-acoustothermal.jpeg', doi: 'https://doi.org/10.1021/acs.nanolett.0c03895' },
          { num: 6, title: 'Acoustothermal atomization', journal: 'Phys. Rev. Lett.', year: 2018, img: 'images/papers/06-acoustothermal-prl.png', doi: 'https://doi.org/10.1103/PhysRevLett.121.104502' }
        ]
      }
    ];

    // ===== Orbit bonds (cross-cutting connections) =====
    var orbits = [
      { from: 0, to: 1, label: 'Surface chemistry controls both ice adhesion and thermal conductance',
        path: 'M 175 220 C 250 120 380 100 470 140' },
      { from: 1, to: 2, label: 'Boiling heat transfer depends on interfacial thermal resistance',
        path: 'M 470 140 C 530 220 540 300 510 370' },
      { from: 2, to: 0, label: 'Nucleation kinetics unify freezing and boiling',
        path: 'M 510 370 C 420 380 250 340 175 220' }
    ];

    // ===== Build SVG =====
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 800 500');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.width = '100%';
    svg.style.height = 'auto';
    svg.style.display = 'block';
    svg.setAttribute('aria-label', 'Interactive phase diagram, click research themes to explore, Tab for keyboard navigation');

    var defs = document.createElementNS(NS, 'defs');

    // Amber sphere gradient
    var sgA = document.createElementNS(NS, 'radialGradient');
    sgA.id = 'pd-amber';
    sgA.setAttribute('cx', '0.35'); sgA.setAttribute('cy', '0.35'); sgA.setAttribute('r', '0.65');
    [{ o: '0%', c: '#f0d080' }, { o: '45%', c: '#d4a03a' }, { o: '100%', c: '#7a5a18' }].forEach(function(s) {
      var st = document.createElementNS(NS, 'stop');
      st.setAttribute('offset', s.o); st.setAttribute('stop-color', s.c);
      sgA.appendChild(st);
    });
    defs.appendChild(sgA);

    // Specular highlight
    var hl = document.createElementNS(NS, 'radialGradient');
    hl.id = 'pd-spec';
    hl.setAttribute('cx', '0.30'); hl.setAttribute('cy', '0.30'); hl.setAttribute('r', '0.40');
    [{ o: '0%', a: '0.65' }, { o: '30%', a: '0.20' }, { o: '100%', a: '0' }].forEach(function(s) {
      var st = document.createElementNS(NS, 'stop');
      st.setAttribute('offset', s.o); st.setAttribute('stop-color', 'white'); st.setAttribute('stop-opacity', s.a);
      hl.appendChild(st);
    });
    defs.appendChild(hl);

    // Glow filters
    var gf = document.createElementNS(NS, 'filter');
    gf.id = 'boundary-glow';
    gf.setAttribute('x', '-20%'); gf.setAttribute('y', '-20%');
    gf.setAttribute('width', '140%'); gf.setAttribute('height', '140%');
    var gb = document.createElementNS(NS, 'feGaussianBlur');
    gb.setAttribute('in', 'SourceGraphic'); gb.setAttribute('stdDeviation', '6');
    gf.appendChild(gb);
    defs.appendChild(gf);

    var mf = document.createElementNS(NS, 'filter');
    mf.id = 'marker-glow';
    mf.setAttribute('x', '-50%'); mf.setAttribute('y', '-50%');
    mf.setAttribute('width', '200%'); mf.setAttribute('height', '200%');
    var mb = document.createElementNS(NS, 'feGaussianBlur');
    mb.setAttribute('in', 'SourceGraphic'); mb.setAttribute('stdDeviation', '4');
    mb.setAttribute('result', 'blur');
    mf.appendChild(mb);
    var mm = document.createElementNS(NS, 'feMerge');
    var mm1 = document.createElementNS(NS, 'feMergeNode'); mm1.setAttribute('in', 'blur'); mm.appendChild(mm1);
    var mm2 = document.createElementNS(NS, 'feMergeNode'); mm2.setAttribute('in', 'SourceGraphic'); mm.appendChild(mm2);
    mf.appendChild(mm);
    defs.appendChild(mf);
    svg.appendChild(defs);

    // Helpers
    function makePath(d, fill, stroke, sw, opacity) {
      var p = document.createElementNS(NS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', fill || 'none');
      if (stroke) p.setAttribute('stroke', stroke);
      if (sw) p.setAttribute('stroke-width', sw);
      if (opacity !== undefined) p.setAttribute('opacity', opacity);
      return p;
    }

    function makeText(x, y, text, opts) {
      var t = document.createElementNS(NS, 'text');
      t.setAttribute('x', x); t.setAttribute('y', y);
      t.setAttribute('text-anchor', opts.anchor || 'middle');
      t.setAttribute('fill', opts.fill || '#c0c0c8');
      t.setAttribute('font-family', opts.font || 'Inter, sans-serif');
      t.setAttribute('font-size', opts.size || '12');
      if (opts.weight) t.setAttribute('font-weight', opts.weight);
      if (opts.spacing) t.setAttribute('letter-spacing', opts.spacing);
      if (opts.transform) t.setAttribute('transform', opts.transform);
      t.textContent = text;
      return t;
    }

    // ===== Phase fills =====
    svg.appendChild(makePath(SOLID_FILL, 'rgba(70,135,215,0.06)'));
    svg.appendChild(makePath(LIQUID_FILL, 'rgba(100,190,170,0.05)'));
    svg.appendChild(makePath(VAPOR_FILL, 'rgba(212,160,58,0.04)'));

    // ===== Phase labels =====
    svg.appendChild(makeText(155, 130, 'SOLID', { size: '28', weight: '700', fill: 'rgba(70,135,215,0.22)', font: '"Fraunces", serif', spacing: '0.15em' }));
    svg.appendChild(makeText(530, 85, 'LIQUID', { size: '28', weight: '700', fill: 'rgba(100,190,170,0.22)', font: '"Fraunces", serif', spacing: '0.15em' }));
    svg.appendChild(makeText(640, 430, 'VAPOUR', { size: '28', weight: '700', fill: 'rgba(212,160,58,0.18)', font: '"Fraunces", serif', spacing: '0.15em' }));

    // ===== Axes =====
    var axG = document.createElementNS(NS, 'g');
    var xAx = document.createElementNS(NS, 'line');
    xAx.setAttribute('x1', 80); xAx.setAttribute('y1', 460);
    xAx.setAttribute('x2', 750); xAx.setAttribute('y2', 460);
    xAx.setAttribute('stroke', 'rgba(200,200,210,0.3)'); xAx.setAttribute('stroke-width', '1');
    axG.appendChild(xAx);
    var yAx = document.createElementNS(NS, 'line');
    yAx.setAttribute('x1', 80); yAx.setAttribute('y1', 460);
    yAx.setAttribute('x2', 80); yAx.setAttribute('y2', 40);
    yAx.setAttribute('stroke', 'rgba(200,200,210,0.3)'); yAx.setAttribute('stroke-width', '1');
    axG.appendChild(yAx);
    axG.appendChild(makeText(420, 490, 'Temperature \u2192', { size: '11', fill: 'rgba(200,200,210,0.55)', spacing: '0.08em', weight: '500' }));
    axG.appendChild(makeText(40, 250, 'Pressure \u2192', { size: '11', fill: 'rgba(200,200,210,0.55)', spacing: '0.08em', weight: '500', transform: 'rotate(-90 40 250)' }));
    svg.appendChild(axG);

    // ===== Boundary glows (hidden) =====
    var glowFusion = makePath(FUSION, 'none', '#d4a03a', '12', 0);
    glowFusion.setAttribute('filter', 'url(#boundary-glow)');
    glowFusion.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowFusion);

    var glowVapor = makePath(VAPORIZATION, 'none', '#d4a03a', '12', 0);
    glowVapor.setAttribute('filter', 'url(#boundary-glow)');
    glowVapor.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowVapor);

    var glowSublim = makePath(SUBLIMATION, 'none', '#d4a03a', '8', 0);
    glowSublim.setAttribute('filter', 'url(#boundary-glow)');
    glowSublim.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowSublim);

    var glowMap = { fusion: [glowFusion], vapor: [glowVapor] };

    // ===== Base boundary curves =====
    svg.appendChild(makePath(SUBLIMATION, 'none', 'rgba(200,200,210,0.4)', '2'));
    svg.appendChild(makePath(FUSION, 'none', 'rgba(200,200,210,0.45)', '2'));
    svg.appendChild(makePath(VAPORIZATION, 'none', 'rgba(200,200,210,0.45)', '2'));

    // ===== Triple & critical points =====
    var tpDot = document.createElementNS(NS, 'circle');
    tpDot.setAttribute('cx', TP.x); tpDot.setAttribute('cy', TP.y);
    tpDot.setAttribute('r', '4'); tpDot.setAttribute('fill', 'rgba(200,200,210,0.4)');
    svg.appendChild(tpDot);
    svg.appendChild(makeText(TP.x, TP.y - 10, 'triple point', { size: '9', fill: 'rgba(200,200,210,0.45)' }));

    var cpDot = document.createElementNS(NS, 'circle');
    cpDot.setAttribute('cx', CP.x); cpDot.setAttribute('cy', CP.y);
    cpDot.setAttribute('r', '3'); cpDot.setAttribute('fill', 'rgba(200,200,210,0.3)');
    svg.appendChild(cpDot);
    svg.appendChild(makeText(CP.x + 10, CP.y - 6, 'critical point', { size: '9', fill: 'rgba(200,200,210,0.4)', anchor: 'start' }));

    // ===== Orbit bonds between themes =====
    var orbitGroup = document.createElementNS(NS, 'g');
    svg.appendChild(orbitGroup);

    var orbitData = [];
    orbits.forEach(function(orb) {
      // Visible arc
      var arc = document.createElementNS(NS, 'path');
      arc.setAttribute('d', orb.path);
      arc.setAttribute('fill', 'none');
      arc.setAttribute('stroke', 'rgba(212,160,58,0.12)');
      arc.setAttribute('stroke-width', '1.5');
      arc.setAttribute('stroke-dasharray', '6 4');
      arc.style.transition = 'stroke 0.3s, stroke-width 0.3s';
      orbitGroup.appendChild(arc);

      // Wide invisible hit area for hover
      var hitArc = document.createElementNS(NS, 'path');
      hitArc.setAttribute('d', orb.path);
      hitArc.setAttribute('fill', 'none');
      hitArc.setAttribute('stroke', 'transparent');
      hitArc.setAttribute('stroke-width', '20');
      hitArc.style.cursor = 'pointer';
      orbitGroup.appendChild(hitArc);

      // Drifting particle
      var particle = document.createElementNS(NS, 'circle');
      particle.setAttribute('r', '2.5');
      particle.setAttribute('fill', '#d4a03a');
      particle.setAttribute('opacity', '0.5');
      orbitGroup.appendChild(particle);

      var entry = { arc: arc, hitArc: hitArc, particle: particle, pathEl: arc, orb: orb, t: Math.random() };
      orbitData.push(entry);

      hitArc.addEventListener('mouseenter', function(e) {
        arc.setAttribute('stroke', 'rgba(212,160,58,0.35)');
        arc.setAttribute('stroke-width', '2');
        particle.setAttribute('opacity', '0.9');
        showOrbitTip(orb, e);
      });
      hitArc.addEventListener('mousemove', function(e) { showOrbitTip(orb, e); });
      hitArc.addEventListener('mouseleave', function() {
        arc.setAttribute('stroke', 'rgba(212,160,58,0.12)');
        arc.setAttribute('stroke-width', '1.5');
        particle.setAttribute('opacity', '0.5');
        hideTooltip();
      });
    });

    // Orbit tooltip (reuses the research-tooltip element)
    var tooltip = document.getElementById('research-tooltip');
    var ttTitle = tooltip.querySelector('.rt-title');
    var ttDesc = tooltip.querySelector('.rt-desc');

    function showOrbitTip(orb, evt) {
      var from = themes[orb.from], to = themes[orb.to];
      ttTitle.textContent = from.label.replace('\n', ' ') + ' \u2194 ' + to.label.replace('\n', ' ');
      ttDesc.textContent = orb.label;
      var rect = container.getBoundingClientRect();
      var tx = evt.clientX - rect.left + 15;
      var ty = evt.clientY - rect.top - 10;
      tooltip.style.left = Math.min(tx, rect.width - 280) + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    }

    // Animate orbit particles
    function animateParticles() {
      orbitData.forEach(function(entry) {
        entry.t += 0.0008;
        if (entry.t > 1) entry.t -= 1;
        var len = entry.pathEl.getTotalLength();
        var pt = entry.pathEl.getPointAtLength(entry.t * len);
        entry.particle.setAttribute('cx', pt.x.toFixed(1));
        entry.particle.setAttribute('cy', pt.y.toFixed(1));
      });
      requestAnimationFrame(animateParticles);
    }

    // ===== Research markers =====
    var MARKER_R = 14;
    var markerGroup = document.createElementNS(NS, 'g');

    themes.forEach(function(th, idx) {
      var g = document.createElementNS(NS, 'g');
      g.setAttribute('transform', 'translate(' + th.x + ',' + th.y + ')');
      g.style.cursor = 'pointer';

      // Ring pulse element (fires once on load)
      var ring = document.createElementNS(NS, 'circle');
      ring.setAttribute('r', MARKER_R);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#d4a03a');
      ring.setAttribute('stroke-width', '2');
      ring.setAttribute('opacity', '0');
      g.appendChild(ring);

      var glow = document.createElementNS(NS, 'circle');
      glow.setAttribute('r', MARKER_R + 6);
      glow.setAttribute('fill', 'rgba(212,160,58,0.3)');
      glow.setAttribute('filter', 'url(#marker-glow)');
      glow.setAttribute('opacity', '0');
      glow.style.transition = 'opacity 0.3s ease';
      g.appendChild(glow);

      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('r', MARKER_R);
      circ.setAttribute('fill', 'url(#pd-amber)');
      g.appendChild(circ);

      var spec = document.createElementNS(NS, 'circle');
      spec.setAttribute('r', MARKER_R);
      spec.setAttribute('fill', 'url(#pd-spec)');
      g.appendChild(spec);

      th.ringEl = ring;
      th.markerIdx = idx;

      // Multi-line label support
      var lines = th.label.split('\n');
      lines.forEach(function(line, i) {
        var label = document.createElementNS(NS, 'text');
        label.setAttribute('y', MARKER_R + 18 + i * 14);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('fill', '#c0c0c8');
        label.setAttribute('font-family', 'Inter, sans-serif');
        label.setAttribute('font-size', '10');
        label.setAttribute('font-weight', '600');
        label.setAttribute('letter-spacing', '0.03em');
        label.textContent = line;
        g.appendChild(label);
      });

      // Keyboard accessibility
      g.setAttribute('tabindex', '0');
      g.setAttribute('role', 'button');
      g.setAttribute('aria-label', th.label.replace('\n', ' ') + ': ' + th.desc);
      (function(th, g) {
        g.addEventListener('focus', function() {
          highlightTheme(th);
        });
        g.addEventListener('blur', function() { clearHighlight(); });
      })(th, g);

      th.el = g;
      th.glowEl = glow;
      markerGroup.appendChild(g);
    });
    svg.appendChild(markerGroup);
    container.appendChild(svg);

    // ===== Tooltip (hover) =====
    var hoveredTheme = null;

    function showTooltip(th, screenX, screenY) {
      var displayLabel = th.label.replace('\n', ' ');
      ttTitle.textContent = displayLabel;
      ttDesc.textContent = th.desc;
      var rect = container.getBoundingClientRect();
      var tx = screenX - rect.left + 15;
      var ty = screenY - rect.top - 10;
      tooltip.style.left = Math.min(tx, rect.width - 280) + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    function fireRing(th) {
      var ring = th.ringEl;
      var startR = MARKER_R;
      var endR = MARKER_R + 22;
      var duration = 800;
      var t0 = performance.now();
      function frame(now) {
        var t = Math.min((now - t0) / duration, 1);
        var ease = 1 - Math.pow(1 - t, 3);
        ring.setAttribute('r', (startR + (endR - startR) * ease).toFixed(1));
        ring.setAttribute('opacity', (0.7 * (1 - ease)).toFixed(3));
        ring.setAttribute('stroke-width', (2 * (1 - ease * 0.6)).toFixed(2));
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function highlightTheme(th) {
      if (hoveredTheme === th) return;
      clearHighlight();
      hoveredTheme = th;
      th.glowEl.setAttribute('opacity', '0.7');
      fireRing(th);
      openPanel(th);
      var glows = glowMap[th.boundary];
      if (glows) glows.forEach(function(g) { g.setAttribute('opacity', '0.4'); });
    }

    function clearHighlight() {
      if (!hoveredTheme) return;
      hoveredTheme.glowEl.setAttribute('opacity', '0');
      var glows = glowMap[hoveredTheme.boundary];
      if (glows) glows.forEach(function(g) { g.setAttribute('opacity', '0'); });
      hoveredTheme = null;
    }

    function hitTest(svgX, svgY) {
      for (var i = 0; i < themes.length; i++) {
        var th = themes[i];
        var dx = svgX - th.x, dy = svgY - th.y;
        if (dx * dx + dy * dy < (MARKER_R + 12) * (MARKER_R + 12)) return th;
      }
      return null;
    }

    svg.addEventListener('mousemove', function(e) {
      var rect = svg.getBoundingClientRect();
      var svgX = (e.clientX - rect.left) * (800 / rect.width);
      var svgY = (e.clientY - rect.top) * (500 / rect.height);
      var hit = hitTest(svgX, svgY);
      if (hit) {
        highlightTheme(hit);
        svg.style.cursor = 'pointer';
      } else {
        clearHighlight();
        svg.style.cursor = 'default';
      }
    });

    svg.addEventListener('mouseleave', clearHighlight);

    // Touch: tap highlights + opens panel, tap elsewhere dismisses
    svg.addEventListener('touchend', function(e) {
      var touch = e.changedTouches[0];
      var rect = svg.getBoundingClientRect();
      var svgX = (touch.clientX - rect.left) * (800 / rect.width);
      var svgY = (touch.clientY - rect.top) * (500 / rect.height);
      var hit = hitTest(svgX, svgY);
      if (hit) {
        e.preventDefault();
        highlightTheme(hit);
      } else {
        clearHighlight();
      }
    });

    // ===== Theme panel =====
    var panel = document.getElementById('research-panel');
    var rpTitle = panel.querySelector('.rp-title');
    var rpNarrative = panel.querySelector('.rp-narrative');
    var rpPapers = panel.querySelector('.rp-papers');
    var rpClose = panel.querySelector('.rp-close');
    var panelOpen = false;

    function openPanel(th) {
      rpTitle.textContent = th.label.replace('\n', ' ');
      rpNarrative.textContent = th.narrative;

      rpPapers.innerHTML = '';
      th.papers.forEach(function(p) {
        var card = document.createElement('a');
        card.className = 'rp-paper';
        card.href = p.doi;
        card.target = '_blank';
        card.rel = 'noopener';

        var img = document.createElement('img');
        img.className = 'rp-thumb';
        img.src = p.img;
        img.alt = '';
        card.appendChild(img);

        var info = document.createElement('div');
        info.className = 'rp-paper-info';

        var title = document.createElement('div');
        title.className = 'rp-paper-title';
        title.textContent = '[' + p.num + '] ' + p.title;
        info.appendChild(title);

        var meta = document.createElement('div');
        meta.className = 'rp-paper-meta';
        meta.textContent = p.journal + ' (' + p.year + ')';
        info.appendChild(meta);

        card.appendChild(info);
        rpPapers.appendChild(card);
      });

      panel.classList.add('visible');
      panelOpen = true;
    }

    function closePanel() {
      panel.classList.remove('visible');
      panelOpen = false;
    }

    rpClose.addEventListener('click', function(e) {
      e.stopPropagation();
      closePanel();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && panelOpen) closePanel();
    });

    // Start particle animation
    requestAnimationFrame(animateParticles);

    // ===== Ring pulse on load (staggered sonar ping) =====
    themes.forEach(function(th) {
      setTimeout(function() { fireRing(th); }, 600 + th.markerIdx * 400);
    });

    // ===== Idle breathing (subtle scale pulse) =====
    var breathStart = performance.now();
    function breathe(now) {
      var elapsed = now - breathStart;
      themes.forEach(function(th) {
        // Offset each marker by 1.3s so they don't breathe in sync
        var phase = (elapsed + th.markerIdx * 1300) / 4000;
        var s = 1 + 0.06 * Math.sin(phase * 2 * Math.PI);
        th.el.setAttribute('transform', 'translate(' + th.x + ',' + th.y + ') scale(' + s.toFixed(4) + ')');
      });
      requestAnimationFrame(breathe);
    }
    requestAnimationFrame(breathe);
  });
})();
</script>
