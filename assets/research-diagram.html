<script>
(function() {
  'use strict';

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  document.addEventListener('DOMContentLoaded', function() {
    var container = document.getElementById('research-diagram');
    if (!container) return;

    var NS = 'http://www.w3.org/2000/svg';

    // ===== Key coordinates =====
    var TP = { x: 300, y: 330 };
    var CP = { x: 620, y: 130 };
    var FT = { x: 280, y: 45 };

    var SUBLIMATION  = 'M 80 450 Q 190 400 ' + TP.x + ' ' + TP.y;
    var FUSION       = 'M ' + TP.x + ' ' + TP.y + ' Q 290 180 ' + FT.x + ' ' + FT.y;
    var VAPORIZATION = 'M ' + TP.x + ' ' + TP.y + ' C 380 290 500 200 ' + CP.x + ' ' + CP.y;

    var SOLID_FILL  = 'M 80 40 L ' + FT.x + ' ' + FT.y + ' Q 290 180 ' + TP.x + ' ' + TP.y + ' Q 190 400 80 450 Z';
    var LIQUID_FILL = 'M ' + FT.x + ' ' + FT.y + ' L 750 40 L 750 130 L ' + CP.x + ' ' + CP.y + ' C 500 200 380 290 ' + TP.x + ' ' + TP.y + ' Q 290 180 ' + FT.x + ' ' + FT.y + ' Z';
    var VAPOR_FILL  = 'M 80 460 L 80 450 Q 190 400 ' + TP.x + ' ' + TP.y + ' C 380 290 500 200 ' + CP.x + ' ' + CP.y + ' L 750 130 L 750 460 Z';

    // Three phenomena — positioned inside their metastable phase regions
    var themes = [
      { id: 'ice', label: 'Ice Nucleation and Growth', x: 175, y: 220, section: 'ice-nucleation-and-de-icing',
        desc: 'Supercooled water \u2014 ice nucleation on surfaces, vibration effects, icephobic design',
        boundary: 'fusion' },
      { id: 'heat', label: 'Interfacial Heat Transfer', x: 470, y: 140, section: 'nanoscale-heat-transfer',
        desc: 'Interfacial thermal conductance \u2014 spectral mechanisms, surface chemistry, nanomaterial-enhanced cooling',
        boundary: 'fusion' },
      { id: 'boil', label: 'Phase Change and Bubble Dynamics', x: 510, y: 370, section: 'boiling-and-bubble-dynamics',
        desc: 'Superheated liquid \u2014 vapour bubble nucleation, wettability effects, acoustothermal dynamics',
        boundary: 'vapor' }
    ];

    // ===== Build SVG =====
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 800 500');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    svg.style.width = '100%';
    svg.style.height = 'auto';
    svg.style.display = 'block';

    var defs = document.createElementNS(NS, 'defs');

    // Amber sphere gradient
    var sgA = document.createElementNS(NS, 'radialGradient');
    sgA.id = 'pd-amber';
    sgA.setAttribute('cx', '0.35'); sgA.setAttribute('cy', '0.35'); sgA.setAttribute('r', '0.65');
    [{ o: '0%', c: '#f0d080' }, { o: '45%', c: '#d4a03a' }, { o: '100%', c: '#7a5a18' }].forEach(function(s) {
      var st = document.createElementNS(NS, 'stop');
      st.setAttribute('offset', s.o); st.setAttribute('stop-color', s.c);
      sgA.appendChild(st);
    });
    defs.appendChild(sgA);

    // Specular highlight
    var hl = document.createElementNS(NS, 'radialGradient');
    hl.id = 'pd-spec';
    hl.setAttribute('cx', '0.30'); hl.setAttribute('cy', '0.30'); hl.setAttribute('r', '0.40');
    [{ o: '0%', a: '0.65' }, { o: '30%', a: '0.20' }, { o: '100%', a: '0' }].forEach(function(s) {
      var st = document.createElementNS(NS, 'stop');
      st.setAttribute('offset', s.o); st.setAttribute('stop-color', 'white'); st.setAttribute('stop-opacity', s.a);
      hl.appendChild(st);
    });
    defs.appendChild(hl);

    // Glow filters
    var gf = document.createElementNS(NS, 'filter');
    gf.id = 'boundary-glow';
    gf.setAttribute('x', '-20%'); gf.setAttribute('y', '-20%');
    gf.setAttribute('width', '140%'); gf.setAttribute('height', '140%');
    var gb = document.createElementNS(NS, 'feGaussianBlur');
    gb.setAttribute('in', 'SourceGraphic'); gb.setAttribute('stdDeviation', '6');
    gf.appendChild(gb);
    defs.appendChild(gf);

    var mf = document.createElementNS(NS, 'filter');
    mf.id = 'marker-glow';
    mf.setAttribute('x', '-50%'); mf.setAttribute('y', '-50%');
    mf.setAttribute('width', '200%'); mf.setAttribute('height', '200%');
    var mb = document.createElementNS(NS, 'feGaussianBlur');
    mb.setAttribute('in', 'SourceGraphic'); mb.setAttribute('stdDeviation', '4');
    mb.setAttribute('result', 'blur');
    mf.appendChild(mb);
    var mm = document.createElementNS(NS, 'feMerge');
    var mm1 = document.createElementNS(NS, 'feMergeNode'); mm1.setAttribute('in', 'blur'); mm.appendChild(mm1);
    var mm2 = document.createElementNS(NS, 'feMergeNode'); mm2.setAttribute('in', 'SourceGraphic'); mm.appendChild(mm2);
    mf.appendChild(mm);
    defs.appendChild(mf);
    svg.appendChild(defs);

    // Helpers
    function makePath(d, fill, stroke, sw, opacity) {
      var p = document.createElementNS(NS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('fill', fill || 'none');
      if (stroke) p.setAttribute('stroke', stroke);
      if (sw) p.setAttribute('stroke-width', sw);
      if (opacity !== undefined) p.setAttribute('opacity', opacity);
      return p;
    }

    function makeText(x, y, text, opts) {
      var t = document.createElementNS(NS, 'text');
      t.setAttribute('x', x); t.setAttribute('y', y);
      t.setAttribute('text-anchor', opts.anchor || 'middle');
      t.setAttribute('fill', opts.fill || '#c0c0c8');
      t.setAttribute('font-family', opts.font || 'Inter, sans-serif');
      t.setAttribute('font-size', opts.size || '12');
      if (opts.weight) t.setAttribute('font-weight', opts.weight);
      if (opts.spacing) t.setAttribute('letter-spacing', opts.spacing);
      if (opts.transform) t.setAttribute('transform', opts.transform);
      t.textContent = text;
      return t;
    }

    // ===== Phase fills =====
    svg.appendChild(makePath(SOLID_FILL, 'rgba(70,135,215,0.06)'));
    svg.appendChild(makePath(LIQUID_FILL, 'rgba(100,190,170,0.05)'));
    svg.appendChild(makePath(VAPOR_FILL, 'rgba(212,160,58,0.04)'));

    // ===== Phase labels =====
    svg.appendChild(makeText(155, 180, 'SOLID', { size: '28', weight: '700', fill: 'rgba(70,135,215,0.12)', font: '"Fraunces", serif', spacing: '0.15em' }));
    svg.appendChild(makeText(530, 85, 'LIQUID', { size: '28', weight: '700', fill: 'rgba(100,190,170,0.12)', font: '"Fraunces", serif', spacing: '0.15em' }));
    svg.appendChild(makeText(600, 400, 'VAPOUR', { size: '28', weight: '700', fill: 'rgba(212,160,58,0.08)', font: '"Fraunces", serif', spacing: '0.15em' }));

    // ===== Axes =====
    var axG = document.createElementNS(NS, 'g');
    var xAx = document.createElementNS(NS, 'line');
    xAx.setAttribute('x1', 80); xAx.setAttribute('y1', 460);
    xAx.setAttribute('x2', 750); xAx.setAttribute('y2', 460);
    xAx.setAttribute('stroke', 'rgba(200,200,210,0.15)'); xAx.setAttribute('stroke-width', '1');
    axG.appendChild(xAx);
    var yAx = document.createElementNS(NS, 'line');
    yAx.setAttribute('x1', 80); yAx.setAttribute('y1', 460);
    yAx.setAttribute('x2', 80); yAx.setAttribute('y2', 40);
    yAx.setAttribute('stroke', 'rgba(200,200,210,0.15)'); yAx.setAttribute('stroke-width', '1');
    axG.appendChild(yAx);
    axG.appendChild(makeText(420, 490, 'Temperature \u2192', { size: '11', fill: 'rgba(200,200,210,0.3)', spacing: '0.08em', weight: '500' }));
    axG.appendChild(makeText(40, 250, 'Pressure \u2192', { size: '11', fill: 'rgba(200,200,210,0.3)', spacing: '0.08em', weight: '500', transform: 'rotate(-90 40 250)' }));
    svg.appendChild(axG);

    // ===== Boundary glows (hidden) =====
    var glowFusion = makePath(FUSION, 'none', '#d4a03a', '12', 0);
    glowFusion.setAttribute('filter', 'url(#boundary-glow)');
    glowFusion.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowFusion);

    var glowVapor = makePath(VAPORIZATION, 'none', '#d4a03a', '12', 0);
    glowVapor.setAttribute('filter', 'url(#boundary-glow)');
    glowVapor.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowVapor);

    var glowSublim = makePath(SUBLIMATION, 'none', '#d4a03a', '8', 0);
    glowSublim.setAttribute('filter', 'url(#boundary-glow)');
    glowSublim.style.transition = 'opacity 0.3s ease';
    svg.appendChild(glowSublim);

    var glowMap = { fusion: [glowFusion], vapor: [glowVapor] };

    // ===== Base boundary curves =====
    svg.appendChild(makePath(SUBLIMATION, 'none', 'rgba(200,200,210,0.25)', '2'));
    svg.appendChild(makePath(FUSION, 'none', 'rgba(200,200,210,0.3)', '2'));
    svg.appendChild(makePath(VAPORIZATION, 'none', 'rgba(200,200,210,0.3)', '2'));

    // ===== Triple & critical points =====
    var tpDot = document.createElementNS(NS, 'circle');
    tpDot.setAttribute('cx', TP.x); tpDot.setAttribute('cy', TP.y);
    tpDot.setAttribute('r', '4'); tpDot.setAttribute('fill', 'rgba(200,200,210,0.4)');
    svg.appendChild(tpDot);
    svg.appendChild(makeText(TP.x, TP.y - 10, 'triple point', { size: '9', fill: 'rgba(200,200,210,0.25)' }));

    var cpDot = document.createElementNS(NS, 'circle');
    cpDot.setAttribute('cx', CP.x); cpDot.setAttribute('cy', CP.y);
    cpDot.setAttribute('r', '3'); cpDot.setAttribute('fill', 'rgba(200,200,210,0.3)');
    svg.appendChild(cpDot);
    svg.appendChild(makeText(CP.x + 10, CP.y - 6, 'critical point', { size: '9', fill: 'rgba(200,200,210,0.2)', anchor: 'start' }));

    // ===== Research markers =====
    var MARKER_R = 14;
    var markerGroup = document.createElementNS(NS, 'g');

    themes.forEach(function(th) {
      var g = document.createElementNS(NS, 'g');
      g.setAttribute('transform', 'translate(' + th.x + ',' + th.y + ')');
      g.style.cursor = 'pointer';

      var glow = document.createElementNS(NS, 'circle');
      glow.setAttribute('r', MARKER_R + 6);
      glow.setAttribute('fill', 'rgba(212,160,58,0.3)');
      glow.setAttribute('filter', 'url(#marker-glow)');
      glow.setAttribute('opacity', '0');
      glow.style.transition = 'opacity 0.3s ease';
      g.appendChild(glow);

      var circ = document.createElementNS(NS, 'circle');
      circ.setAttribute('r', MARKER_R);
      circ.setAttribute('fill', 'url(#pd-amber)');
      g.appendChild(circ);

      var spec = document.createElementNS(NS, 'circle');
      spec.setAttribute('r', MARKER_R);
      spec.setAttribute('fill', 'url(#pd-spec)');
      g.appendChild(spec);

      var label = document.createElementNS(NS, 'text');
      label.setAttribute('y', MARKER_R + 18);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('fill', '#c0c0c8');
      label.setAttribute('font-family', 'Inter, sans-serif');
      label.setAttribute('font-size', '10');
      label.setAttribute('font-weight', '600');
      label.setAttribute('letter-spacing', '0.03em');
      label.textContent = th.label;
      g.appendChild(label);

      th.el = g;
      th.glowEl = glow;
      markerGroup.appendChild(g);
    });
    svg.appendChild(markerGroup);
    container.appendChild(svg);

    // ===== Tooltip (hover) =====
    var tooltip = document.getElementById('research-tooltip');
    var ttTitle = tooltip.querySelector('.rt-title');
    var ttDesc = tooltip.querySelector('.rt-desc');
    var hoveredTheme = null;

    function showTooltip(th, screenX, screenY) {
      ttTitle.textContent = th.label;
      ttDesc.textContent = th.desc;
      var rect = container.getBoundingClientRect();
      var tx = screenX - rect.left + 15;
      var ty = screenY - rect.top - 10;
      tooltip.style.left = Math.min(tx, rect.width - 280) + 'px';
      tooltip.style.top = ty + 'px';
      tooltip.classList.add('visible');
    }

    function hideTooltip() { tooltip.classList.remove('visible'); }

    function highlightTheme(th) {
      if (hoveredTheme === th) return;
      clearHighlight();
      hoveredTheme = th;
      th.glowEl.setAttribute('opacity', '0.7');
      var glows = glowMap[th.boundary];
      if (glows) glows.forEach(function(g) { g.setAttribute('opacity', '0.4'); });
    }

    function clearHighlight() {
      if (!hoveredTheme) return;
      hoveredTheme.glowEl.setAttribute('opacity', '0');
      var glows = glowMap[hoveredTheme.boundary];
      if (glows) glows.forEach(function(g) { g.setAttribute('opacity', '0'); });
      hoveredTheme = null;
      hideTooltip();
    }

    function hitTest(svgX, svgY) {
      for (var i = 0; i < themes.length; i++) {
        var th = themes[i];
        var dx = svgX - th.x, dy = svgY - th.y;
        if (dx * dx + dy * dy < (MARKER_R + 12) * (MARKER_R + 12)) return th;
      }
      return null;
    }

    svg.addEventListener('mousemove', function(e) {
      var rect = svg.getBoundingClientRect();
      var svgX = (e.clientX - rect.left) * (800 / rect.width);
      var svgY = (e.clientY - rect.top) * (500 / rect.height);
      var hit = hitTest(svgX, svgY);
      if (hit) {
        highlightTheme(hit);
        showTooltip(hit, e.clientX, e.clientY);
        svg.style.cursor = 'pointer';
      } else {
        clearHighlight();
        svg.style.cursor = 'default';
      }
    });

    svg.addEventListener('mouseleave', clearHighlight);

    // Touch: tap highlights + opens callout, tap elsewhere dismisses
    svg.addEventListener('touchend', function(e) {
      var touch = e.changedTouches[0];
      var rect = svg.getBoundingClientRect();
      var svgX = (touch.clientX - rect.left) * (800 / rect.width);
      var svgY = (touch.clientY - rect.top) * (500 / rect.height);
      var hit = hitTest(svgX, svgY);
      if (hit) {
        e.preventDefault();
        highlightTheme(hit);
        openCallout(hit);
      } else {
        clearHighlight();
        if (calloutOpen) closeCallout();
      }
    });

    // ===== Callout card (click) =====
    var callout = document.getElementById('research-callout');
    var rcTitle = callout.querySelector('.rc-title');
    var rcBody = callout.querySelector('.rc-body');
    var rcClose = callout.querySelector('.rc-close');
    var calloutOpen = false;

    function openCallout(th) {
      // Pull content from the page section
      var section = document.getElementById(th.section);
      if (!section) return;

      rcTitle.textContent = th.label;
      // Clone everything after the h3
      rcBody.innerHTML = '';
      var children = section.children;
      for (var i = 0; i < children.length; i++) {
        if (children[i].tagName === 'H3') continue;
        rcBody.appendChild(children[i].cloneNode(true));
      }

      callout.classList.add('visible');
      calloutOpen = true;
    }

    function closeCallout() {
      callout.classList.remove('visible');
      calloutOpen = false;
    }

    svg.addEventListener('click', function(e) {
      var rect = svg.getBoundingClientRect();
      var svgX = (e.clientX - rect.left) * (800 / rect.width);
      var svgY = (e.clientY - rect.top) * (500 / rect.height);
      var hit = hitTest(svgX, svgY);
      if (hit) {
        openCallout(hit);
      } else if (calloutOpen) {
        closeCallout();
      }
    });

    rcClose.addEventListener('click', function(e) {
      e.stopPropagation();
      closeCallout();
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && calloutOpen) closeCallout();
    });
  });
})();
</script>
